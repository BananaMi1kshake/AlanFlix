<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlanFlix</title>
    
    <!-- Load Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Production Versions) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation. Note: we are not using the 'type="module"' workaround as we use the classic runtime -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configure Babel to use classic runtime to avoid import errors in browser -->
    <script>
        Babel.registerPreset("react-classic", {
          presets: [
            [
              Babel.availablePresets["react"],
              { runtime: "classic" }
            ]
          ]
        });
    </script>

    <style>
      /* Base Styles */
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap');

      body {
        background-color: #09090b;
        color: white;
        font-family: 'Inter', sans-serif;
        margin: 0;
        overflow-x: hidden;
      }

      /* --- Intro Animation Styles --- */
      .intro-overlay {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        perspective: 1000px;
      }

      .intro-light-beam {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 200vw;
        height: 200vh;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(229,9,20,0.4) 0%, rgba(0,0,0,1) 60%);
        opacity: 0;
        animation: beamFlash 4.5s ease-in-out forwards;
      }

      .intro-text-container {
        position: relative;
        transform-style: preserve-3d;
      }

      /* 
       * FIX: Removed letter-spacing animation to prevent browser freezing.
       * Replaced with pure transform (scale/translateZ) for smooth GPU acceleration.
       */
      .intro-text {
        font-family: 'Bebas Neue', cursive;
        /* Responsive font size */
        font-size: clamp(6rem, 15vw, 12rem);
        color: transparent;
        -webkit-text-stroke: 4px #e50914;
        text-transform: uppercase;
        animation: cinematicText 4.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        position: relative;
        z-index: 10;
        text-align: center;
      }

      .intro-text::before {
        content: 'ALANFLIX';
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        text-align: center;
        color: #e50914;
        filter: blur(3px);
        opacity: 0;
        animation: textGlow 4.5s ease-in-out forwards;
        z-index: -1;
      }

      .intro-particles {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, #fff 1px, transparent 1px);
        background-size: 50px 50px;
        opacity: 0.1;
        animation: particleZoom 4.5s linear forwards;
      }

      @keyframes cinematicText {
        0% { transform: translateZ(-2000px) rotateX(45deg); opacity: 0; }
        30% { transform: translateZ(0) rotateX(0deg); opacity: 1; color: transparent; }
        50% { color: #e50914; text-shadow: 0 0 5px #e50914, 0 0 10px #e50914; transform: translateZ(50px) scale(1.05); }
        85% { transform: translateZ(100px) scale(1.15); opacity: 1; filter: blur(0px); }
        100% { transform: translateZ(1000px) scale(3); opacity: 0; filter: blur(2px); }
      }

      @keyframes textGlow {
        0%, 30% { opacity: 0; }
        50%, 80% { opacity: 0.9; }
        100% { opacity: 0; }
      }

      @keyframes beamFlash {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
      }

      @keyframes particleZoom {
        0% { transform: scale(1) translateZ(-500px); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: scale(5) translateZ(500px); opacity: 0; }
      }

      /* --- UI Styles --- */
      .glass-nav {
        background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 70%, rgba(0,0,0,0) 100%);
        backdrop-filter: blur(8px);
        /* Ensure navigation doesn't block clicks when transparent */
        pointer-events: none;
      }
      
      .glass-nav > * {
         pointer-events: auto;
      }

      .movie-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      /* Reduce hover scale slightly for mobile to prevent clipping */
      @media (min-width: 768px) {
        .movie-card:hover {
          transform: scale(1.05) translateY(-10px);
          z-index: 10;
          box-shadow: 0 20px 40px rgba(229, 9, 20, 0.2);
        }
      }
      
      .poster-overlay {
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .movie-card:hover .poster-overlay {
        opacity: 1;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #09090b; }
      ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #e50914; }

      /* Hide horizontal scrollbar but allow scrolling */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
      const { useState, useEffect, useRef, useCallback } = React;

      // Inline SVG Icons to replace lucide-react (prevents build-tool requirements)
      const Search = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>);
      const Play = ({ className, fill }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
      const X = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
      const Film = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>);
      const AlertCircle = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>);
      const Tv = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>);

      const OMDB_API_KEY = 'dd555970';

      // Expanded curated pools of exact IMDb IDs.
      // The app will randomly select 6 from each pool on every load to keep categories fresh!
      const HOME_CATEGORIES = [
        { 
          id: 'trending', 
          title: 'Trending Movies', 
          pool: ['tt15398776', 'tt15239678', 'tt10366206', 'tt1517268', 'tt9362722', 'tt1745960', 'tt10872600', 'tt1877830', 'tt1630029', 'tt23289004', 'tt1160419', 'tt0468569'] 
        },
        { 
          id: 'tv', 
          title: 'Binge-Worthy TV Shows', 
          pool: ['tt0903747', 'tt0944947', 'tt4574334', 'tt1190634', 'tt7660850', 'tt11280740', 'tt0475784', 'tt0386676', 'tt0118401', 'tt0898266', 'tt0108778', 'tt0285331'] 
        },
        { 
          id: 'scifi', 
          title: 'Sci-Fi Masterpieces', 
          pool: ['tt0816692', 'tt0133093', 'tt1375666', 'tt1856101', 'tt2543164', 'tt0088763', 'tt0103064', 'tt0076759', 'tt0108052', 'tt0120804', 'tt0113568', 'tt0499549'] 
        },
        { 
          id: 'animation', 
          title: 'Animated Hits', 
          pool: ['tt4633694', 'tt0245429', 'tt0910970', 'tt0114709', 'tt2380307', 'tt1049413', 'tt2953050', 'tt0119698', 'tt0432283', 'tt0317219', 'tt0102926', 'tt0112462'] 
        }
      ];

      const STREAMING_SERVERS = [
        { name: 'VidLink', url: 'https://vidlink.pro/movie/' },
        { name: 'SuperEmbed', url: 'https://superembed.stream/movie/' },
        { name: 'VidSrc ME', url: 'https://vidsrc.me/embed/movie/' },
        { name: 'Embed SU', url: 'https://embed.su/embed/movie/' },
        { name: 'VidSrc PRO', url: 'https://vidsrc.pro/embed/movie/' },
        { name: 'VidSrc IN', url: 'https://vidsrc.in/embed/movie/' },
        { name: 'AutoEmbed', url: 'https://autoembed.co/movie/imdb/' },
        { name: 'VidSrc NET', url: 'https://vidsrc.net/embed/movie/' },
        { name: 'Smashy', url: 'https://embed.smashystream.com/playere.php?imdb=' },
        { name: 'MultiEmbed', url: 'https://multiembed.mov/directstream.php?video_id=' },
        { name: 'VidSrc RU', url: 'https://vidsrc-embed.ru/embed/movie/' },
        { name: 'VidSrc CC', url: 'https://vidsrc.cc/v2/embed/movie/' }
      ];

      const TV_SERVERS = [
        { name: 'VidLink', url: 'https://vidlink.pro/tv/' },
        { name: 'SuperEmbed', url: 'https://superembed.stream/tv/' },
        { name: 'VidSrc ME', url: 'https://vidsrc.me/embed/tv/' },
        { name: 'Embed SU', url: 'https://embed.su/embed/tv/' },
        { name: 'VidSrc PRO', url: 'https://vidsrc.pro/embed/tv/' },
        { name: 'VidSrc IN', url: 'https://vidsrc.in/embed/tv/' },
        { name: 'AutoEmbed', url: 'https://autoembed.co/tv/imdb/' },
        { name: 'VidSrc NET', url: 'https://vidsrc.net/embed/tv/' },
        { name: 'MultiEmbed', url: 'https://multiembed.mov/directstream.php?video_id=' },
        { name: 'VidSrc CC', url: 'https://vidsrc.cc/v2/embed/tv/' }
      ];

      // Custom Hook for Infinite Scrolling
      function useInfiniteScroll(fetchData, hasMore) {
        const loadMoreRef = useRef(null);
        
        const handleIntersection = useCallback((entries) => {
          const isIntersecting = entries[0]?.isIntersecting;
          if (isIntersecting && hasMore) {
            fetchData();
          }
        }, [fetchData, hasMore]);
        
        useEffect(() => {
          const observer = new IntersectionObserver(handleIntersection, {
            threshold: 0.1, // Trigger slightly before the very bottom
            rootMargin: '100px', // Pre-load margin
          });
          
          if (loadMoreRef.current) {
            observer.observe(loadMoreRef.current);
          }
          
          return () => observer.disconnect();
        }, [handleIntersection]);
        
        return loadMoreRef;
      }

      function App() {
        const [introFinished, setIntroFinished] = useState(false);
        const [query, setQuery] = useState('');
        const [movies, setMovies] = useState([]);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);
        const [selectedMovie, setSelectedMovie] = useState(null);
        const [activeServer, setActiveServer] = useState(STREAMING_SERVERS[0]);
        const [searchType, setSearchType] = useState('movie'); // 'movie' or 'series'
        
        // Pagination state for infinite scroll
        const [page, setPage] = useState(1);
        const [hasMore, setHasMore] = useState(false);
        const [totalResults, setTotalResults] = useState(0);

        // Main Home Page State
        const [isHome, setIsHome] = useState(true);
        const [homeData, setHomeData] = useState([]);
        const [loadingHome, setLoadingHome] = useState(true);

        // Run intro animation sequence
        useEffect(() => {
          const timer = setTimeout(() => {
            setIntroFinished(true);
          }, 4500); 
          
          return () => clearTimeout(timer);
        }, []);

        // Initial load for Home Page data
        useEffect(() => {
          if (introFinished && isHome) {
            fetchHomeData();
          }
        }, [introFinished, isHome]);

        // Bulletproof fallback data fetcher
        const fetchFallbackData = async () => {
          try {
            const promises = HOME_CATEGORIES.map(async (cat) => {
              const shuffledIds = [...cat.pool].sort(() => 0.5 - Math.random()).slice(0, 12);
              const moviePromises = shuffledIds.map(async (id) => {
                const response = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&i=${id}`);
                return await response.json();
              });
              const moviesData = await Promise.all(moviePromises);
              const validMovies = moviesData.filter(m => m.Response === 'True');
              return { ...cat, movies: validMovies };
            });
            const results = await Promise.all(promises);
            setHomeData(results);
          } catch (err) {
            console.error('Fallback data failed', err);
          }
        };

        const fetchHomeData = async () => {
          setLoadingHome(true);
          try {
            // Fetch live data from open APIs (YTS for movies, TVMaze for TV) in parallel for speed
            const [ytsTrending, tvMaze, ytsNew, ytsTop] = await Promise.all([
              fetch('https://yts.mx/api/v2/list_movies.json?sort_by=download_count&limit=20').then(res => res.json()),
              fetch('https://api.tvmaze.com/shows').then(res => res.json()),
              fetch('https://yts.mx/api/v2/list_movies.json?sort_by=year&limit=20').then(res => res.json()),
              fetch('https://yts.mx/api/v2/list_movies.json?sort_by=rating&limit=20').then(res => res.json())
            ]);

            const trendingMovies = ytsTrending.data.movies.map(m => ({
              Title: m.title,
              Year: m.year.toString(),
              Poster: m.medium_cover_image,
              imdbID: m.imdb_code,
              Type: 'movie'
            }));

            // TVMaze returns all shows, we grab popular ones with IMDb IDs
            const popularTV = tvMaze.sort((a, b) => b.weight - a.weight).map(show => ({
              Title: show.name,
              Year: show.premiered ? show.premiered.substring(0, 4) : 'N/A',
              Poster: show.image ? show.image.medium : 'N/A',
              imdbID: show.externals?.imdb,
              Type: 'series'
            })).filter(show => show.imdbID).slice(0, 20);

            const newMovies = ytsNew.data.movies.map(m => ({
              Title: m.title,
              Year: m.year.toString(),
              Poster: m.medium_cover_image,
              imdbID: m.imdb_code,
              Type: 'movie'
            }));

            const topMovies = ytsTop.data.movies.map(m => ({
              Title: m.title,
              Year: m.year.toString(),
              Poster: m.medium_cover_image,
              imdbID: m.imdb_code,
              Type: 'movie'
            }));

            // Inject the true live data into the UI
            setHomeData([
              { id: 'trending', title: 'Live Trending Movies', movies: trendingMovies },
              { id: 'tv', title: 'Live Popular TV Shows', movies: popularTV },
              { id: 'new', title: 'New Releases', movies: newMovies },
              { id: 'top', title: 'Highest Rated Movies', movies: topMovies }
            ]);

          } catch (err) {
            // Bulletproof failsafe: If ISP/Adblocker blocks YTS, fallback to the hardcoded pools
            console.warn('Live APIs blocked. Falling back to randomized OMDB pools.', err);
            await fetchFallbackData();
          } finally {
            setLoadingHome(false);
          }
        };

        // Re-run search automatically if the user toggles between TV/Movies
        useEffect(() => {
           if (query && !isHome) {
             // Reset pagination state when search type changes
             setMovies([]);
             setPage(1);
             setHasMore(true);
             executeSearch(1, true); // true = isNewSearch
           }
        }, [searchType]);

        const handleSearchSubmit = (e) => {
          if (e) e.preventDefault();
          if (!query.trim()) return;
          
          // Reset pagination state for new query
          setIsHome(false);
          setMovies([]);
          setPage(1);
          setHasMore(true);
          setTotalResults(0);
          executeSearch(1, true);
        };

        const executeSearch = async (pageNum, isNewSearch = false) => {
          if (!query.trim()) return;

          setLoading(true);
          if (isNewSearch) {
              setError(null);
          }

          try {
            const response = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&s=${encodeURIComponent(query)}&type=${searchType}&page=${pageNum}`);
            const data = await response.json();

            if (data.Response === 'True') {
              // Append new results to existing results (or set new array if new search)
              setMovies(prev => isNewSearch ? data.Search : [...prev, ...data.Search]);
              setTotalResults(parseInt(data.totalResults, 10));
              
              // Calculate if we have more pages (OMDB returns 10 results per page)
              const maxPages = Math.ceil(parseInt(data.totalResults, 10) / 10);
              setHasMore(pageNum < maxPages);
            } else {
              if (isNewSearch) {
                  setMovies([]);
                  setError(data.Error);
                  setHasMore(false);
              } else {
                  // If we hit an error on a subsequent page (e.g. reached the end), just stop loading more
                  setHasMore(false);
              }
            }
          } catch (err) {
            if (isNewSearch) {
                setError('Failed to fetch data from OMDB API. Check your connection.');
            }
            console.error(err);
          } finally {
            setLoading(false);
          }
        };

        const loadMoreData = useCallback(() => {
          if (!loading && hasMore) {
              const nextPage = page + 1;
              setPage(nextPage);
              executeSearch(nextPage, false);
          }
        }, [page, loading, hasMore, query, searchType]);

        const loaderRef = useInfiniteScroll(loadMoreData, hasMore);

        const playMovie = (movie) => {
          setSelectedMovie(movie);
          // Set the correct list of servers based on if it's a movie or tv show
          if (movie.Type === 'series' || movie.Type === 'episode') {
            setActiveServer(TV_SERVERS[0]);
          } else {
            setActiveServer(STREAMING_SERVERS[0]);
          }
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const handleNextServer = () => {
          const serversList = (selectedMovie.Type === 'series' || selectedMovie.Type === 'episode') ? TV_SERVERS : STREAMING_SERVERS;
          const currentIndex = serversList.findIndex(s => s.name === activeServer.name);
          const nextIndex = (currentIndex + 1) % serversList.length;
          setActiveServer(serversList[nextIndex]);
        };

        const closePlayer = () => {
          setSelectedMovie(null);
        };

        const goHome = () => {
          setIsHome(true);
          setQuery('');
          setMovies([]);
          setSelectedMovie(null);
          setError(null);
        };

        const currentServersList = (selectedMovie && (selectedMovie.Type === 'series' || selectedMovie.Type === 'episode')) ? TV_SERVERS : STREAMING_SERVERS;

        return (
          <React.Fragment>
            {/* OVER-THE-TOP INTRO ANIMATION */}
            {!introFinished && (
              <div className="intro-overlay">
                <div className="intro-light-beam"></div>
                <div className="intro-particles"></div>
                <div className="intro-text-container">
                  <h1 className="intro-text">ALANFLIX</h1>
                </div>
              </div>
            )}

            {/* MAIN APPLICATION */}
            <div className={`min-h-screen bg-zinc-950 transition-opacity duration-1000 ${introFinished ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
              
              <nav className="fixed top-0 w-full z-50 glass-nav px-4 md:px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="flex items-center justify-between w-full md:w-auto">
                  <div className="flex items-center gap-2 cursor-pointer transition-transform hover:scale-105" onClick={goHome}>
                    <Film className="text-red-600 w-8 h-8" />
                    <span className="font-['Bebas_Neue'] text-3xl tracking-wide text-red-600 drop-shadow-[0_0_10px_rgba(229,9,20,0.5)]">
                      ALANFLIX
                    </span>
                  </div>
                </div>

                <div className="flex w-full md:w-auto gap-2 md:gap-4 items-center">
                  <div className="flex bg-zinc-900 rounded-full p-1 border border-zinc-800 shrink-0">
                    <button 
                      onClick={() => setSearchType('movie')}
                      className={`px-3 py-1.5 md:px-4 rounded-full text-xs md:text-sm font-semibold flex items-center gap-1.5 transition-colors ${searchType === 'movie' ? 'bg-red-600 text-white shadow-lg' : 'text-zinc-400 hover:text-white'}`}
                    >
                      <Film className="w-3.5 h-3.5 md:w-4 md:h-4" /> <span className="hidden sm:inline">Movies</span>
                    </button>
                    <button 
                      onClick={() => setSearchType('series')}
                      className={`px-3 py-1.5 md:px-4 rounded-full text-xs md:text-sm font-semibold flex items-center gap-1.5 transition-colors ${searchType === 'series' ? 'bg-red-600 text-white shadow-lg' : 'text-zinc-400 hover:text-white'}`}
                    >
                      <Tv className="w-3.5 h-3.5 md:w-4 md:h-4" /> <span className="hidden sm:inline">TV Shows</span>
                    </button>
                  </div>

                  <form onSubmit={handleSearchSubmit} className="relative w-full md:w-72 lg:w-96">
                    <input
                      type="text"
                      value={query}
                      onChange={(e) => setQuery(e.target.value)}
                      placeholder={`Search ${searchType === 'movie' ? 'movies' : 'TV shows'}...`}
                      className="w-full bg-zinc-900/80 border border-zinc-800 text-white rounded-full py-2 pl-4 pr-10 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-all placeholder-zinc-500 text-sm md:text-base"
                    />
                    <button 
                      type="submit" 
                      className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-zinc-400 hover:text-red-500 transition-colors"
                    >
                      <Search className="w-4 h-4 md:w-5 md:h-5" />
                    </button>
                  </form>
                </div>
              </nav>

              <main className="pt-32 pb-12 px-4 sm:px-6 lg:px-12 max-w-[1800px] mx-auto">
                
                {/* Active Player Section */}
                {selectedMovie && (
                  <div className="w-full mb-12 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-4">
                      <h2 className="text-2xl sm:text-3xl font-bold text-white flex items-center gap-3">
                        <span className="w-1.5 h-8 bg-red-600 rounded-full shrink-0"></span>
                        <span className="truncate">{selectedMovie.Title}</span> 
                        <span className="text-zinc-500 font-normal shrink-0">({selectedMovie.Year})</span>
                      </h2>
                      <button 
                        onClick={closePlayer}
                        className="flex items-center justify-center gap-2 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-white rounded-full transition-colors shrink-0"
                      >
                        <X className="w-4 h-4" /> Close
                      </button>
                    </div>

                    <div className="bg-zinc-900 rounded-lg p-3 sm:p-4 mb-4 border border-zinc-800">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-3">
                        <span className="text-xs sm:text-sm font-medium text-zinc-400">
                          {selectedMovie.Type === 'series' ? 'TV Server List' : 'Movie Server List'} ({currentServersList.length}):
                        </span>
                        <button 
                          onClick={handleNextServer}
                          className="flex items-center justify-center gap-2 px-4 py-1.5 bg-red-600 hover:bg-red-700 text-white text-sm font-bold rounded-full transition-colors shadow-[0_0_15px_rgba(229,9,20,0.3)]"
                        >
                          <Play className="w-4 h-4" fill="currentColor" /> Try Next Server
                        </button>
                      </div>
                      <div className="flex flex-wrap items-center gap-2">
                        {currentServersList.map((server) => (
                          <button
                            key={server.name}
                            onClick={() => setActiveServer(server)}
                            className={`px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold transition-all duration-300 ${
                              activeServer.name === server.name 
                                ? 'bg-white text-black shadow-[0_0_10px_rgba(255,255,255,0.3)] scale-105' 
                                : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700 hover:text-white'
                            }`}
                          >
                            {server.name}
                          </button>
                        ))}
                      </div>
                    </div>
                    
                    <div className="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-[0_0_50px_rgba(229,9,20,0.15)] ring-1 ring-zinc-800">
                      <div className="absolute inset-0 flex items-center justify-center -z-10">
                         <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600"></div>
                      </div>
                      <iframe
                        key={activeServer.url}
                        className="absolute inset-0 w-full h-full"
                        src={`${activeServer.url}${selectedMovie.imdbID}`}
                        allowFullScreen
                        frameBorder="0"
                        title="Video Player"
                        referrerPolicy="origin"
                      />
                    </div>
                  </div>
                )}

                {/* MAIN PAGE LAYOUT */}
                {isHome && !selectedMovie && (
                   <div className="space-y-12">
                     {/* Featured Hero Banner */}
                     <div className="relative w-full h-[40vh] sm:h-[50vh] md:h-[60vh] rounded-2xl overflow-hidden group">
                       <div className="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/40 to-transparent z-10"></div>
                       <img 
                         src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070&auto=format&fit=crop" 
                         alt="Featured" 
                         className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700"
                       />
                       <div className="absolute bottom-0 left-0 p-6 md:p-12 z-20 w-full max-w-3xl">
                         <div className="flex items-center gap-2 text-red-500 font-bold tracking-widest text-sm mb-2 md:mb-4">
                           <Film className="w-4 h-4" /> FEATURED PREMIERE
                         </div>
                         <h1 className="text-4xl md:text-6xl font-black text-white mb-2 md:mb-4 leading-tight drop-shadow-lg">Cinematic <br/> Masterpieces</h1>
                         <p className="text-zinc-300 text-sm md:text-lg mb-6 line-clamp-2 md:line-clamp-none">
                           Experience the greatest stories ever told. Unlimited streaming of critically acclaimed movies, exclusive original series, and timeless classics.
                         </p>
                       </div>
                     </div>

                     {/* Horizontal Scrolling Categories */}
                     {loadingHome ? (
                       <div className="flex flex-col items-center justify-center py-20">
                         <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600"></div>
                       </div>
                     ) : (
                       homeData.map((category) => (
                         <div key={category.id} className="relative">
                           <h3 className="text-xl md:text-2xl font-bold text-white mb-4 pl-2 border-l-4 border-red-600">
                             {category.title}
                           </h3>
                           <div className="flex overflow-x-auto hide-scrollbar gap-4 pb-6 pt-2 snap-x snap-mandatory">
                             {category.movies.map((movie) => (
                               <div 
                                 key={movie.imdbID} 
                                 className="snap-start shrink-0 w-[140px] sm:w-[160px] md:w-[200px] lg:w-[220px] movie-card relative group cursor-pointer rounded-lg overflow-hidden bg-zinc-900"
                                 onClick={() => playMovie(movie)}
                               >
                                 <div className="aspect-[2/3] w-full relative">
                                   {movie.Poster !== 'N/A' ? (
                                     <img 
                                       src={movie.Poster} 
                                       alt={movie.Title}
                                       className="w-full h-full object-cover"
                                       loading="lazy"
                                     />
                                   ) : (
                                     <div className="w-full h-full flex flex-col items-center justify-center bg-zinc-800 text-zinc-500 p-4 text-center">
                                       <Film className="w-12 h-12 mb-2 opacity-50" />
                                       <span className="text-xs font-semibold">NO POSTER</span>
                                     </div>
                                   )}
                                   
                                   {/* Hover Overlay */}
                                   <div className="poster-overlay absolute inset-0 flex flex-col items-center justify-center backdrop-blur-sm">
                                     <div className="w-10 h-10 md:w-14 md:h-14 bg-red-600 rounded-full flex items-center justify-center transform scale-50 group-hover:scale-100 transition-transform duration-300 shadow-[0_0_30px_rgba(229,9,20,0.8)]">
                                       <Play className="w-4 h-4 md:w-6 md:h-6 text-white ml-1 pl-0.5" fill="currentColor" />
                                     </div>
                                   </div>
                                 </div>
                                 <div className="p-2 md:p-3">
                                   <h4 className="text-white font-semibold truncate text-xs md:text-sm" title={movie.Title}>
                                     {movie.Title}
                                   </h4>
                                   <p className="text-red-500 text-[10px] md:text-xs font-bold mt-1">
                                     {movie.Year} <span className="text-zinc-600 font-normal ml-1">· {movie.Type === 'series' ? 'TV' : 'Movie'}</span>
                                   </p>
                                 </div>
                               </div>
                             ))}
                           </div>
                         </div>
                       ))
                     )}
                   </div>
                )}

                {/* Search Results Title */}
                {!isHome && !selectedMovie && (
                   <h3 className="text-xl font-medium text-zinc-400 mb-6 flex items-center gap-2">
                     Results for <span className="text-white font-bold">"{query}"</span> in {searchType === 'series' ? 'TV Shows' : 'Movies'}
                     {!loading && totalResults > 0 && <span className="text-sm font-normal text-zinc-500 ml-2">({totalResults} found)</span>}
                   </h3>
                )}

                {/* Error State (only show on initial load failure) */}
                {error && page === 1 && !isHome && (
                  <div className="flex flex-col items-center justify-center py-24 text-center px-4">
                    <AlertCircle className="w-16 h-16 text-zinc-700 mb-4" />
                    <h3 className="text-2xl font-bold text-white mb-2">No Results Found</h3>
                    <p className="text-zinc-500 max-w-md">{error}</p>
                  </div>
                )}

                {/* Search Results Grid */}
                {!isHome && !error && movies.length > 0 && (
                  <React.Fragment>
                      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6 gap-y-8 sm:gap-y-10">
                        {movies.map((movie, index) => (
                          <div 
                            // Use index to ensure unique keys as OMDB sometimes returns duplicate IDs across pages
                            key={`${movie.imdbID}-${index}`} 
                            className="movie-card relative group cursor-pointer rounded-lg overflow-hidden bg-zinc-900"
                            onClick={() => playMovie(movie)}
                          >
                            <div className="aspect-[2/3] w-full relative">
                              {movie.Poster !== 'N/A' ? (
                                <img 
                                  src={movie.Poster} 
                                  alt={movie.Title}
                                  className="w-full h-full object-cover"
                                  loading="lazy"
                                />
                              ) : (
                                <div className="w-full h-full flex flex-col items-center justify-center bg-zinc-800 text-zinc-500 p-4 text-center">
                                  <Film className="w-12 h-12 mb-2 opacity-50" />
                                  <span className="text-xs font-semibold">NO POSTER</span>
                                </div>
                              )}
                              
                              {/* Hover Overlay */}
                              <div className="poster-overlay absolute inset-0 flex flex-col items-center justify-center backdrop-blur-sm">
                                <div className="w-12 h-12 md:w-14 md:h-14 bg-red-600 rounded-full flex items-center justify-center transform scale-50 group-hover:scale-100 transition-transform duration-300 shadow-[0_0_30px_rgba(229,9,20,0.8)]">
                                  <Play className="w-5 h-5 md:w-6 md:h-6 text-white ml-1 pl-0.5" fill="currentColor" />
                                </div>
                                <span className="mt-4 font-bold text-xs md:text-sm tracking-wider uppercase opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-100 hidden sm:block">
                                  Play Now
                                </span>
                              </div>
                            </div>
                            
                            {/* Card Info */}
                            <div className="p-2 md:p-3">
                              <h4 className="text-white font-semibold truncate text-xs md:text-sm" title={movie.Title}>
                                {movie.Title}
                              </h4>
                              <p className="text-red-500 text-[10px] md:text-xs font-bold mt-1">
                                {movie.Year} <span className="text-zinc-600 font-normal ml-1">· {movie.Type === 'series' ? 'TV' : 'Movie'}</span>
                              </p>
                            </div>
                          </div>
                        ))}
                      </div>

                      {/* Infinite Scroll Loader Sentinel */}
                      <div ref={loaderRef} className="w-full py-12 flex flex-col items-center justify-center">
                          {loading && (
                             <div className="flex flex-col items-center">
                                 <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-red-600 mb-4"></div>
                                 <span className="text-zinc-500 text-sm font-semibold tracking-wider uppercase">Loading more...</span>
                             </div>
                          )}
                          {!hasMore && movies.length > 0 && !loading && (
                              <span className="text-zinc-600 text-sm font-semibold tracking-wider uppercase bg-zinc-900 px-6 py-2 rounded-full border border-zinc-800">
                                  End of results
                              </span>
                          )}
                      </div>
                  </React.Fragment>
                )}

              </main>
            </div>
          </React.Fragment>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
