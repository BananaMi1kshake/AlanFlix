<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlanFlix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      // Force Babel to use the classic JSX runtime to prevent the "Cannot use import statement" crash
      Babel.registerPreset('react-classic', {
        presets: [
          [Babel.availablePresets.react, { runtime: 'classic' }]
        ]
      });
    </script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;800&display=swap');

      body {
        background-color: #09090b;
        color: white;
        font-family: 'Inter', sans-serif;
        margin: 0;
        overflow-x: hidden;
      }

      /* --- Intro Animation Styles --- */
      .intro-overlay {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        perspective: 1000px;
      }

      .intro-light-beam {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 200vw;
        height: 200vh;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(229,9,20,0.4) 0%, rgba(0,0,0,1) 60%);
        opacity: 0;
        animation: beamFlash 4.5s ease-in-out forwards;
      }

      .intro-text-container {
        position: relative;
        transform-style: preserve-3d;
      }

      .intro-text {
        font-family: 'Bebas Neue', cursive;
        font-size: 6rem; /* Mobile optimized base size */
        color: transparent;
        -webkit-text-stroke: 2px #e50914;
        text-transform: uppercase;
        animation: cinematicText 4.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        position: relative;
        z-index: 10;
      }

      @media (min-width: 768px) {
        .intro-text {
          font-size: 12rem;
          -webkit-text-stroke: 4px #e50914;
        }
      }

      .intro-text::before {
        content: 'ALANFLIX';
        position: absolute;
        left: 0;
        top: 0;
        color: #e50914;
        filter: blur(3px);
        opacity: 0;
        animation: textGlow 4.5s ease-in-out forwards;
        z-index: -1;
      }

      .intro-particles {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, #fff 1px, transparent 1px);
        background-size: 50px 50px;
        opacity: 0.1;
        animation: particleZoom 4.5s linear forwards;
      }

      @keyframes cinematicText {
        0% { transform: translateZ(-2000px) rotateX(45deg); opacity: 0; }
        30% { transform: translateZ(0) rotateX(0deg); opacity: 1; color: transparent; }
        50% { color: #e50914; text-shadow: 0 0 5px #e50914, 0 0 10px #e50914; transform: translateZ(50px) scale(1.05); }
        85% { transform: translateZ(100px) scale(1.15); opacity: 1; filter: blur(0px); }
        100% { transform: translateZ(1000px) scale(3); opacity: 0; filter: blur(2px); }
      }

      @keyframes textGlow {
        0%, 30% { opacity: 0; }
        50%, 80% { opacity: 0.9; }
        100% { opacity: 0; }
      }

      @keyframes beamFlash {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
      }

      @keyframes particleZoom {
        0% { transform: scale(1) translateZ(-500px); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: scale(5) translateZ(500px); opacity: 0; }
      }

      /* --- UI Styles --- */
      .glass-nav {
        background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        backdrop-filter: blur(4px);
      }

      .movie-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .movie-card:hover {
        transform: scale(1.05) translateY(-10px);
        z-index: 10;
        box-shadow: 0 20px 40px rgba(229, 9, 20, 0.2);
      }
      
      .poster-overlay {
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .movie-card:hover .poster-overlay {
        opacity: 1;
      }

      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #e50914; }

      /* Hide default scrollbar but keep functionality */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
      const { useState, useEffect, useRef, useCallback } = React;

      // Inline SVG Icons
      const Search = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>);
      const Play = ({ className, fill }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
      const X = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
      const Film = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>);
      const AlertCircle = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>);
      const ChevronDown = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>);
      const Star = ({ className, fill }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>);

      const TMDB_API_KEY = '81869d2e8c49e784b4958d77802dd1f3';
      const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
      const TMDB_IMG_BASE = 'https://image.tmdb.org/t/p/w500';

      const MOVIE_GENRES = ['Action', 'Comedy', 'Sci-Fi', 'Horror', 'Romance', 'Thriller', 'Drama', 'Animation'];
      const TV_GENRES = ['Action', 'Comedy', 'Science-Fiction', 'Horror', 'Romance', 'Thriller', 'Drama', 'Anime'];

      const RU_MOVIE_GENRES = ['Боевик', 'Комедия', 'Фантастика', 'Ужасы', 'Мелодрама', 'Триллер', 'Драма', 'Мультфильм'];
      const RU_TV_GENRES = ['Боевик', 'Комедия', 'Фантастика', 'Ужасы', 'Мелодрама', 'Триллер', 'Драма', 'Аниме'];

      // TMDB uses strict ID numbers for genres (Updated to map Russian words to same universal IDs)
      const TMDB_MOVIE_GENRE_IDS = { 'Action': 28, 'Comedy': 35, 'Sci-Fi': 878, 'Horror': 27, 'Romance': 10749, 'Thriller': 53, 'Drama': 18, 'Animation': 16, 'Боевик': 28, 'Комедия': 35, 'Фантастика': 878, 'Ужасы': 27, 'Мелодрама': 10749, 'Триллер': 53, 'Драма': 18, 'Мультфильм': 16 };
      const TMDB_TV_GENRE_IDS = { 'Action': 10759, 'Comedy': 35, 'Science-Fiction': 10765, 'Horror': 9648, 'Romance': 10749, 'Thriller': 9648, 'Drama': 18, 'Anime': 16, 'Боевик': 10759, 'Комедия': 35, 'Фантастика': 10765, 'Ужасы': 9648, 'Мелодрама': 10749, 'Триллер': 9648, 'Драма': 18, 'Аниме': 16 };

      const EN_STREAMING_SERVERS = [
        { name: 'VidLink', url: 'https://vidlink.pro/movie/' },
        { name: 'SuperEmbed', url: 'https://superembed.stream/movie/' },
        { name: 'VidSrc ME', url: 'https://vidsrc.me/embed/movie/' },
        { name: 'Embed SU', url: 'https://embed.su/embed/movie/' },
        { name: 'VidSrc PRO', url: 'https://vidsrc.pro/embed/movie/' },
        { name: 'VidSrc IN', url: 'https://vidsrc.in/embed/movie/' },
        { name: 'AutoEmbed', url: 'https://autoembed.co/movie/imdb/' },
        { name: 'VidSrc NET', url: 'https://vidsrc.net/embed/movie/' },
        { name: 'Smashy', url: 'https://embed.smashystream.com/playere.php?imdb=' },
        { name: 'MultiEmbed', url: 'https://multiembed.mov/directstream.php?video_id=' },
        { name: 'VidSrc CC', url: 'https://vidsrc.cc/v2/embed/movie/' }
      ];

      const EN_TV_SERVERS = [
        { name: 'VidLink', url: 'https://vidlink.pro/tv/' },
        { name: 'SuperEmbed', url: 'https://superembed.stream/tv/' },
        { name: 'VidSrc ME', url: 'https://vidsrc.me/embed/tv/' },
        { name: 'Embed SU', url: 'https://embed.su/embed/tv/' },
        { name: 'VidSrc PRO', url: 'https://vidsrc.pro/embed/tv/' },
        { name: 'VidSrc IN', url: 'https://vidsrc.in/embed/tv/' },
        { name: 'AutoEmbed', url: 'https://autoembed.co/tv/imdb/' },
        { name: 'VidSrc NET', url: 'https://vidsrc.net/embed/tv/' },
        { name: 'MultiEmbed', url: 'https://multiembed.mov/directstream.php?video_id=' },
        { name: 'VidSrc CC', url: 'https://vidsrc.cc/v2/embed/tv/' }
      ];

      const RU_STREAMING_SERVERS = [
        { name: 'Embed SU (Multi-Lang)', url: 'https://embed.su/embed/movie/' },
        { name: 'VidLink (Multi-Audio)', url: 'https://vidlink.pro/movie/' },
        { name: 'VidSrc ME', url: 'https://vidsrc.me/embed/movie/' },
        { name: 'VidSrc CC', url: 'https://vidsrc.cc/v2/embed/movie/' }
      ];

      const RU_TV_SERVERS = [
        { name: 'Embed SU (Multi-Lang)', url: 'https://embed.su/embed/tv/' },
        { name: 'VidLink (Multi-Audio)', url: 'https://vidlink.pro/tv/' },
        { name: 'VidSrc ME', url: 'https://vidsrc.me/embed/tv/' },
        { name: 'VidSrc CC', url: 'https://vidsrc.cc/v2/embed/tv/' }
      ];

      const getTVEmbedUrl = (serverUrl, imdbId, season, episode) => {
        if (serverUrl.includes('autoembed.co')) return `${serverUrl}${imdbId}-${season}-${episode}`;
        if (serverUrl.includes('vidlink.pro') || serverUrl.includes('superembed.stream') || serverUrl.includes('vidsrc')) return `${serverUrl}${imdbId}?season=${season}&episode=${episode}`;
        if (serverUrl.includes('embed.su')) return `${serverUrl}${imdbId}/${season}/${episode}`;
        return `${serverUrl}${imdbId}&s=${season}&e=${episode}`; 
      };

      // Custom Hook for Infinite Scrolling
      function useInfiniteScroll(callback, hasMore, loading) {
        const observer = useRef();
        const lastElementRef = useCallback(node => {
          if (loading) return;
          if (observer.current) observer.current.disconnect();
          observer.current = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && hasMore) {
              callback();
            }
          }, { rootMargin: '200px' }); // Fire slightly before hitting the bottom
          if (node) observer.current.observe(node);
        }, [loading, hasMore, callback]);
        return lastElementRef;
      }

      function App() {
        // Global App States
        const [appLang, setAppLang] = useState('en-US'); // Controls TMDB language and Server Pools
        const [introFinished, setIntroFinished] = useState(false);
        const [isHome, setIsHome] = useState(true);
        const [browseContext, setBrowseContext] = useState('search'); // 'search' or 'genre'
        const [activeGenre, setActiveGenre] = useState(null); // { type, genre }
        
        // Data States
        const [query, setQuery] = useState('');
        const [searchType, setSearchType] = useState('movie');
        const [movies, setMovies] = useState([]);
        const [homeData, setHomeData] = useState([]);
        const [loading, setLoading] = useState(true);
        const [loadingHome, setLoadingHome] = useState(true);
        const [error, setError] = useState(null);
        
        // Infinite Scroll Pagination States
        const [page, setPage] = useState(1);
        const [hasMore, setHasMore] = useState(false);

        // Player & Details States
        const currentMovieServers = appLang === 'ru-RU' ? RU_STREAMING_SERVERS : EN_STREAMING_SERVERS;
        const currentTVServers = appLang === 'ru-RU' ? RU_TV_SERVERS : EN_TV_SERVERS;
        
        const [selectedMovie, setSelectedMovie] = useState(null);
        const [activeServer, setActiveServer] = useState(EN_STREAMING_SERVERS[0]);
        const [showEpisodes, setShowEpisodes] = useState([]);
        const [showSeasons, setShowSeasons] = useState([]);
        const [selectedSeason, setSelectedSeason] = useState(1);
        const [loadingEpisodes, setLoadingEpisodes] = useState(false);
        const [selectedEpisodeData, setSelectedEpisodeData] = useState(null); 

        // Run intro animation sequence
        useEffect(() => {
          const timer = setTimeout(() => {
            setIntroFinished(true);
          }, 4500); 
          return () => clearTimeout(timer);
        }, []);

        // Listen for Language Changes and auto-refresh current view
        useEffect(() => {
          if (!introFinished) return;
          if (isHome) {
             fetchHomeData();
          } else if (browseContext === 'search' && query.trim()) {
             setPage(1);
             fetchSearch(1, true);
          } else if (browseContext === 'genre' && activeGenre) {
             setPage(1);
             loadGenreData(1, activeGenre.type, activeGenre.genre, true);
          }
          if (selectedMovie && selectedMovie.Type === 'series') {
             fetchTVSeasons(selectedMovie.id);
          }
        }, [appLang, introFinished]);

        // Helper to format TMDB responses into our app's structure
        const mapTMDB = (results, type) => results.filter(i => i.poster_path).map(m => ({
            id: m.id,
            Title: m.title || m.name,
            Year: (m.release_date || m.first_air_date || 'N/A').substring(0, 4),
            Poster: m.poster_path ? `${TMDB_IMG_BASE}${m.poster_path}` : 'N/A',
            Type: type,
            imdbRating: m.vote_average ? m.vote_average.toFixed(1) : 'N/A',
            Overview: m.overview
        }));

        const fetchHomeData = async () => {
          setLoadingHome(true);
          try {
            // Fetch everything instantly from TMDB's blazing fast endpoints, passing the chosen language
            const [trendingMovies, popularTV, newMovies, topMovies, actionTV, scifiMovies, comedyTV] = await Promise.all([
              fetch(`${TMDB_BASE_URL}/trending/movie/week?api_key=${TMDB_API_KEY}&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/tv/popular?api_key=${TMDB_API_KEY}&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/movie/now_playing?api_key=${TMDB_API_KEY}&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/movie/top_rated?api_key=${TMDB_API_KEY}&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&with_genres=10759&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=878&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&with_genres=35&language=${appLang}`).then(r => r.json())
            ]);

            const titles = appLang === 'ru-RU' 
              ? ['В тренде сейчас', 'Популярные сериалы', 'Новинки', 'Лучшие фильмы', 'Боевики (Сериалы)', 'Шедевры фантастики', 'Комедийные сериалы']
              : ['Trending Movies Now', 'Binge-Worthy TV Shows', 'New Releases', 'Top Rated Movies', 'Action Packed TV', 'Sci-Fi Masterpieces', 'Comedy Series'];

            setHomeData([
              { title: titles[0], movies: mapTMDB(trendingMovies.results, 'movie') },
              { title: titles[1], movies: mapTMDB(popularTV.results, 'series') },
              { title: titles[2], movies: mapTMDB(newMovies.results, 'movie') },
              { title: titles[3], movies: mapTMDB(topMovies.results, 'movie') },
              { title: titles[4], movies: mapTMDB(actionTV.results, 'series') },
              { title: titles[5], movies: mapTMDB(scifiMovies.results, 'movie') },
              { title: titles[6], movies: mapTMDB(comedyTV.results, 'series') }
            ]);
          } catch (err) {
            console.error('TMDB fetch failed:', err);
            setError('Failed to load TMDB data. Check your API key.');
          } finally {
            setLoadingHome(false);
          }
        };

        const fetchSearch = async (pageNum, isNew = false, typeParam = null) => {
          if (isNew) { setLoading(true); setMovies([]); }
          setError(null);
          
          const currentType = typeParam || searchType;
          const tmdbType = currentType === 'series' ? 'tv' : 'movie';

          try {
            const response = await fetch(`${TMDB_BASE_URL}/search/${tmdbType}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&page=${pageNum}&language=${appLang}`);
            const data = await response.json();

            if (data.results && data.results.length > 0) {
              const mapped = mapTMDB(data.results, currentType);
              setMovies(prev => isNew ? mapped : [...prev, ...mapped]);
              setHasMore(pageNum < data.total_pages); 
            } else {
              if (isNew) { setMovies([]); setError('No titles found'); setHasMore(false); } 
              else { setHasMore(false); }
            }
          } catch (err) {
            if (isNew) setError('Failed to fetch data.');
          } finally {
            setLoading(false);
          }
        };

        const loadGenreData = async (pageNum, type, genre, isNew = false) => {
           if (isNew) { setLoading(true); setMovies([]); }
           setError(null);
           try {
              const tmdbType = type === 'series' ? 'tv' : 'movie';
              const genreId = type === 'series' ? TMDB_TV_GENRE_IDS[genre] : TMDB_MOVIE_GENRE_IDS[genre];
              
              const res = await fetch(`${TMDB_BASE_URL}/discover/${tmdbType}?api_key=${TMDB_API_KEY}&with_genres=${genreId}&page=${pageNum}&sort_by=popularity.desc&language=${appLang}`);
              const data = await res.json();
              
              if (data.results && data.results.length > 0) {
                 const mapped = mapTMDB(data.results, type);
                 setMovies(prev => isNew ? mapped : [...prev, ...mapped]);
                 setHasMore(pageNum < data.total_pages);
              } else {
                 setHasMore(false);
              }
           } catch (err) {
              if (isNew) setError(`Failed to fetch ${genre} titles.`);
           } finally {
              setLoading(false);
           }
        };

        // Actions
        const handleSearchSubmit = (e) => {
          if (e) e.preventDefault();
          if (!query.trim()) return;
          setIsHome(false);
          setBrowseContext('search');
          setActiveGenre(null);
          setPage(1);
          setSelectedMovie(null);
          fetchSearch(1, true, searchType);
        };

        const handleTypeToggle = (type) => {
           setSearchType(type);
           if (query.trim() && !isHome && browseContext === 'search') {
               setPage(1);
               fetchSearch(1, true, type);
           }
        };

        const selectGenre = (type, genre) => {
           setIsHome(false);
           setBrowseContext('genre');
           setActiveGenre({ type, genre });
           setQuery(''); 
           setSelectedMovie(null); 
           setPage(1);
           loadGenreData(1, type, genre, true);
        };

        // Infinite Scroll Callback
        const loadMoreData = useCallback(() => {
           if (loading || !hasMore) return;
           const nextPage = page + 1;
           setPage(nextPage);

           if (browseContext === 'search') {
              fetchSearch(nextPage, false, searchType);
           } else if (browseContext === 'genre') {
              loadGenreData(nextPage, activeGenre.type, activeGenre.genre, false);
           }
        }, [page, loading, hasMore, browseContext, activeGenre, query, appLang]);

        const lastElementRef = useInfiniteScroll(loadMoreData, hasMore, loading);

        const playMovie = async (movie) => {
          let finalMovie = { ...movie };
          
          // Before opening the player, ask TMDB for the official IMDb ID since our streaming servers need it
          if (!finalMovie.imdbID) {
             try {
                const res = await fetch(`${TMDB_BASE_URL}/${movie.Type === 'series' ? 'tv' : 'movie'}/${movie.id}/external_ids?api_key=${TMDB_API_KEY}`);
                const ids = await res.json();
                finalMovie.imdbID = ids.imdb_id;
             } catch(e) {
                console.error('Failed to grab IMDb ID from TMDB');
             }
          }

          setSelectedMovie(finalMovie);
          setIsHome(false);
          setActiveServer(finalMovie.Type === 'series' ? currentTVServers[0] : currentMovieServers[0]);
          setSelectedEpisodeData(null); 
          window.scrollTo({ top: 0, behavior: 'smooth' });

          // Fetch full seasons and episodes list from TMDB
          if (finalMovie.Type === 'series') fetchTVSeasons(finalMovie.id);
        };

        const fetchTVSeasons = async (tmdbID) => {
          setLoadingEpisodes(true);
          try {
            const res = await fetch(`${TMDB_BASE_URL}/tv/${tmdbID}?api_key=${TMDB_API_KEY}&language=${appLang}`);
            const data = await res.json();
            
            // Extract all valid seasons (ignoring Season 0 which TMDB uses for "Specials")
            const validSeasons = data.seasons.filter(s => s.season_number > 0).map(s => s.season_number);
            setShowSeasons(validSeasons);
            
            if (validSeasons.length > 0) {
               setSelectedSeason(validSeasons[0]);

                 number: ep.episode_number,
                 name: ep.name,
                 image: { medium: ep.still_path ? `${TMDB_IMG_BASE}${ep.still_path}` : null },
                 airdate: ep.air_date,
                 summary: ep.overview

                                     key={`${movie.imdbID}-${index}`} 
                                     className="movie-card flex-none w-36 sm:w-44 md:w-48 lg:w-56 relative group cursor-pointer rounded-xl overflow-hidden bg-zinc-900 snap-start shadow-lg"
                                     onClick={() => playMovie(movie)}
                                   >
                                     <div className="aspect-[2/3] w-full relative">
                                       {/* IMDB Rating Badge */}
                                       {movie.imdbRating && movie.imdbRating !== 'N/A' && (
                                         <div className="absolute top-2 right-2 bg-black/80 backdrop-blur-md px-2 py-1 rounded-md flex items-center gap-1 z-20 border border-zinc-800 shadow-[0_4px_10px_rgba(0,0,0,0.5)]">
                                           <Star className="w-3 h-3 text-yellow-500" fill="currentColor" />
                                           <span className="text-white text-[11px] font-black">{movie.imdbRating}</span>
                                         </div>
                                       )}

                                       {movie.Poster !== 'N/A' ? (
                                         <img src={movie.Poster} alt={movie.Title} className="w-full h-full object-cover" loading="lazy" />
                                       ) : (
                                         <div className="w-full h-full flex flex-col items-center justify-center bg-zinc-950 text-zinc-700 p-4 text-center">
                                           <Film className="w-10 h-10 mb-2 opacity-30" />
                                           <span className="text-[10px] font-bold tracking-widest">NO POSTER</span>
                                         </div>
                                       )}
                                       
                                       <div className="poster-overlay absolute inset-0 flex flex-col items-center justify-center backdrop-blur-[2px]">
                                         <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center transform scale-50 group-hover:scale-100 transition-transform duration-300 shadow-[0_0_30px_rgba(229,9,20,0.8)]">
                                           <Play className="w-5 h-5 text-white ml-1" fill="currentColor" />
                                         </div>
                                       </div>
                                     </div>
                                     
                                     <div className="p-3 sm:p-4 bg-zinc-900">
                                       <h4 className="text-white font-bold truncate text-xs sm:text-sm mb-1">{movie.Title}</h4>
                                       <div className="flex items-center justify-between">
                                          <p className="text-zinc-500 text-[10px] sm:text-xs font-medium">{movie.Year}</p>
                                          <span className={`text-[9px] font-black uppercase px-1.5 py-0.5 rounded-sm ${movie.Type === 'series' ? 'bg-blue-900/50 text-blue-400' : 'bg-red-900/50 text-red-400'}`}>
                                             {movie.Type === 'series' ? 'TV' : 'Movie'}
                                          </span>
                                       </div>
                                     </div>
                                   </div>
                                 ))}
                               </div>
                             </div>
                           )
                         ))}
                       </div>
                    )}
                  </div>
                )}
              </main>
            </div>
          </React.Fragment>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
