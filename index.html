<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlanFlix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      // Force Babel to use the classic JSX runtime to prevent the "Cannot use import statement" crash
      Babel.registerPreset('react-classic', {
        presets: [
          [Babel.availablePresets.react, { runtime: 'classic' }]
        ]
      });
    </script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;800&display=swap');

      body {
        background-color: #09090b;
        color: white;
        font-family: 'Inter', sans-serif;
        margin: 0;
        overflow-x: hidden;
      }

      /* --- Intro Animation Styles --- */
      .intro-overlay {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        perspective: 1000px;
      }

      .intro-light-beam {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 200vw;
        height: 200vh;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(229,9,20,0.4) 0%, rgba(0,0,0,1) 60%);
        opacity: 0;
        animation: beamFlash 4.5s ease-in-out forwards;
      }

      .intro-text-container {
        position: relative;
        transform-style: preserve-3d;
      }

      .intro-text {
        font-family: 'Bebas Neue', cursive;
        font-size: 6rem;
        color: transparent;
        -webkit-text-stroke: 2px #e50914;
        text-transform: uppercase;
        animation: cinematicText 4.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        position: relative;
        z-index: 10;
      }

      @media (min-width: 768px) {
        .intro-text {
          font-size: 12rem;
          -webkit-text-stroke: 4px #e50914;
        }
      }

      .intro-text::before {
        content: 'ALANFLIX';
        position: absolute;
        left: 0;
        top: 0;
        color: #e50914;
        filter: blur(3px);
        opacity: 0;
        animation: textGlow 4.5s ease-in-out forwards;
        z-index: -1;
      }

      .intro-particles {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, #fff 1px, transparent 1px);
        background-size: 50px 50px;
        opacity: 0.1;
        animation: particleZoom 4.5s linear forwards;
      }

      @keyframes cinematicText {
        0% { transform: translateZ(-2000px) rotateX(45deg); opacity: 0; }
        30% { transform: translateZ(0) rotateX(0deg); opacity: 1; color: transparent; }
        50% { color: #e50914; text-shadow: 0 0 5px #e50914, 0 0 10px #e50914; transform: translateZ(50px) scale(1.05); }
        85% { transform: translateZ(100px) scale(1.15); opacity: 1; filter: blur(0px); }
        100% { transform: translateZ(1000px) scale(3); opacity: 0; filter: blur(2px); }
      }

      @keyframes textGlow {
        0%, 30% { opacity: 0; }
        50%, 80% { opacity: 0.9; }
        100% { opacity: 0; }
      }

      @keyframes beamFlash {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
      }

      @keyframes particleZoom {
        0% { transform: scale(1) translateZ(-500px); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: scale(5) translateZ(500px); opacity: 0; }
      }

      .glass-nav {
        background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        backdrop-filter: blur(4px);
      }

      .movie-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .movie-card:hover {
        transform: scale(1.05) translateY(-10px);
        z-index: 10;
        box-shadow: 0 20px 40px rgba(229, 9, 20, 0.2);
      }
      
      .poster-overlay {
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .movie-card:hover .poster-overlay {
        opacity: 1;
      }

      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #e50914; }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
      const { useState, useEffect, useRef, useCallback } = React;

      // Inline SVG Icons
      const Search = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>);
      const Play = ({ className, fill }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
      const X = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
      const Film = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>);
      const AlertCircle = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>);
      const ChevronDown = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>);
      const Star = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>);

      const TMDB_API_KEY = '81869d2e8c49e784b4958d77802dd1f3';
      const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
      const TMDB_IMG_BASE = 'https://image.tmdb.org/t/p/w500';

      const COMMON_GENRES = ['Action', 'Comedy', 'Sci-Fi', 'Horror', 'Romance', 'Thriller', 'Drama', 'Animation', 'Crime', 'Mystery'];
      const RU_COMMON_GENRES = ['Боевик', 'Комедия', 'Фантастика', 'Ужасы', 'Мелодрама', 'Триллер', 'Драма', 'Мультфильм', 'Криминал', 'Детектив'];

      const TMDB_MOVIE_GENRE_IDS = { 'Action': 28, 'Comedy': 35, 'Sci-Fi': 878, 'Horror': 27, 'Romance': 10749, 'Thriller': 53, 'Drama': 18, 'Animation': 16, 'Crime': 80, 'Mystery': 9648, 'Боевик': 28, 'Комедия': 35, 'Фантастика': 878, 'Ужасы': 27, 'Мелодрама': 10749, 'Триллер': 53, 'Драма': 18, 'Мультфильм': 16, 'Криминал': 80, 'Детектив': 9648 };
      const TMDB_TV_GENRE_IDS = { 'Action': 10759, 'Comedy': 35, 'Sci-Fi': 10765, 'Horror': 9648, 'Romance': 10749, 'Thriller': 9648, 'Drama': 18, 'Animation': 16, 'Crime': 80, 'Mystery': 9648, 'Боевик': 10759, 'Комедия': 35, 'Фантастика': 10765, 'Ужасы': 9648, 'Мелодрама': 10749, 'Триллер': 9648, 'Драма': 18, 'Мультфильм': 16, 'Криминал': 80, 'Детектив': 9648 };

      // Custom Hook for Infinite Scrolling
      function useInfiniteScroll(callback, hasMore, loading) {
        const observer = useRef();
        const lastElementRef = useCallback(node => {
          if (loading) return;
          if (observer.current) observer.current.disconnect();
          observer.current = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && hasMore) {
              callback();
            }
          }, { rootMargin: '200px' }); 
          if (node) observer.current.observe(node);
        }, [loading, hasMore, callback]);
        return lastElementRef;
      }

      function App() {
        // Global App States
        const [appLang, setAppLang] = useState('en-US'); // Controls TMDB language and Server Pools
        const [introFinished, setIntroFinished] = useState(false);
        const [isHome, setIsHome] = useState(true);
        const [browseContext, setBrowseContext] = useState('home'); // 'home', 'search' or 'genre'
        const [activeGenre, setActiveGenre] = useState(null); // { type, genre }
        
        // Data States
        const [query, setQuery] = useState('');
        const [debouncedQuery, setDebouncedQuery] = useState('');
        const [searchType, setSearchType] = useState('movie');
        const [movies, setMovies] = useState([]);
        const [homeData, setHomeData] = useState([]);
        const [loading, setLoading] = useState(true);
        const [loadingHome, setLoadingHome] = useState(true);
        const [error, setError] = useState(null);
        
        // Infinite Scroll Pagination States
        const [page, setPage] = useState(1);
        const [hasMore, setHasMore] = useState(false);

        // Player & Details States
        const [selectedMovie, setSelectedMovie] = useState(null);
        const [showEpisodes, setShowEpisodes] = useState([]);
        const [showSeasons, setShowSeasons] = useState([]);
        const [selectedSeason, setSelectedSeason] = useState(1);
        const [loadingEpisodes, setLoadingEpisodes] = useState(false);
        const [selectedEpisodeData, setSelectedEpisodeData] = useState(null); 

        const updateURL = (params) => {
          const url = new URL(window.location);
          url.search = '';
          Object.keys(params).forEach(key => {
            if (params[key]) url.searchParams.set(key, params[key]);
          });
          window.history.pushState({}, '', url);
        };

        const loadHomeGridData = async (pageNum, isNew = false) => {
           if (isNew) { setLoading(true); setMovies([]); }
           setError(null);
           try {
              const res = await fetch(`${TMDB_BASE_URL}/trending/all/week?api_key=${TMDB_API_KEY}&page=${pageNum}&language=${appLang}`);
              const data = await res.json();
              
              if (data.results) {
                 const newItems = data.results.map(m => ({
                    id: m.id, Title: m.title || m.name, Year: (m.release_date || m.first_air_date || 'N/A').substring(0, 4),
                    Poster: m.poster_path ? `${TMDB_IMG_BASE}${m.poster_path}` : 'N/A', Type: m.media_type === 'tv' ? 'series' : 'movie', imdbRating: m.vote_average ? m.vote_average.toFixed(1) : 'N/A'
                 }));
                 setMovies(prev => isNew ? newItems : [...prev, ...newItems]);
                 setHasMore(pageNum < data.total_pages && pageNum < 500); 
              } else {
                 setHasMore(false);
              }
           } catch (err) {
              if (isNew) setError(`Failed to fetch recommendations.`);
           } finally {
              setLoading(false);
           }
        };

        const goHome = (skipUrlUpdate = false) => {
           setIsHome(true);
           setSelectedMovie(null);
           setQuery('');
           setDebouncedQuery('');
           setActiveGenre(null);
           setBrowseContext('home');
           setPage(1);
           if (!skipUrlUpdate) updateURL({});
           fetchHomeData();
           loadHomeGridData(1, true);
        };

        // Listen for browser Back/Forward navigation (PopState)
        useEffect(() => {
          const handleUrlChange = async () => {
             const params = new URLSearchParams(window.location.search);
             const v = params.get('v');
             const q = params.get('q');
             const g = params.get('g');
             const type = params.get('type') || 'movie';

             setSearchType(type);

             if (v) {
                // Deep Link to Movie/Show
                try {
                   const res = await fetch(`${TMDB_BASE_URL}/${type === 'series' ? 'tv' : 'movie'}/${v}?api_key=${TMDB_API_KEY}&language=${appLang}`);
                   const m = await res.json();
                   if (m.id) {
                     const mapped = {
                        id: m.id,
                        Title: m.title || m.name,
                        Year: (m.release_date || m.first_air_date || 'N/A').substring(0, 4),
                        Poster: m.poster_path ? `${TMDB_IMG_BASE}${m.poster_path}` : 'N/A',
                        Type: type,
                        imdbRating: m.vote_average ? m.vote_average.toFixed(1) : 'N/A',
                        Overview: m.overview
                     };
                     playMovie(mapped, true); 
                   }
                } catch (e) {}
             } else if (q) {
                // Deep link to search
                setQuery(q);
                setDebouncedQuery(q);
                setIsHome(false);
                setBrowseContext('search');
                setActiveGenre(null);
                setSelectedMovie(null);
                fetchSearch(1, true, type, q);
             } else if (g) {
                // Deep link to genre
                selectGenre(type, g, true);
             } else {
                goHome(true);
             }
          };

          window.addEventListener('popstate', handleUrlChange);
          if (introFinished) handleUrlChange(); 

          return () => window.removeEventListener('popstate', handleUrlChange);
        }, [appLang, introFinished]);

        // Debounce Query Input
        useEffect(() => {
          const timer = setTimeout(() => setDebouncedQuery(query), 500);
          return () => clearTimeout(timer);
        }, [query]);

        // Trigger Auto-Search
        useEffect(() => {
           const currentQ = new URLSearchParams(window.location.search).get('q') || '';
           if (debouncedQuery.trim() && (debouncedQuery !== currentQ || browseContext !== 'search' || selectedMovie)) {
              setIsHome(false);
              setBrowseContext('search');
              setActiveGenre(null);
              setPage(1);
              setSelectedMovie(null);
              updateURL({ q: debouncedQuery, type: searchType });
              fetchSearch(1, true, searchType, debouncedQuery);
           } else if (debouncedQuery === '' && query === '' && browseContext === 'search') {
              goHome();
           }
        }, [debouncedQuery, searchType]);

        useEffect(() => {
          const timer = setTimeout(() => { setIntroFinished(true); }, 4500); 
          return () => clearTimeout(timer);
        }, []);

        // Listen for Language Changes
        // Listen for Language Changes and auto-refresh current view
        useEffect(() => {
          if (!introFinished) return;
          if (isHome && !new URLSearchParams(window.location.search).has('v')) {
             fetchHomeData();
             if (browseContext === 'home') loadHomeGridData(1, true);
          } else if (browseContext === 'search' && debouncedQuery.trim()) {
             setPage(1);
             fetchSearch(1, true, searchType, debouncedQuery);
          } else if (browseContext === 'genre' && activeGenre) {
             const translatedGenre = appLang === 'ru-RU' ? RU_COMMON_GENRES[COMMON_GENRES.indexOf(activeGenre.genre)] || activeGenre.genre : COMMON_GENRES[RU_COMMON_GENRES.indexOf(activeGenre.genre)] || activeGenre.genre;
             setActiveGenre({ type: activeGenre.type, genre: translatedGenre });
             loadGenreData(1, activeGenre.type, translatedGenre, true);
          }
        }, [appLang, introFinished]);

        const fetchHomeData = async () => {
          setLoadingHome(true);
          try {
            const [trendingMovies, trendingTV, topMovies, popTV] = await Promise.all([
              fetch(`${TMDB_BASE_URL}/trending/movie/week?api_key=${TMDB_API_KEY}&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/trending/tv/week?api_key=${TMDB_API_KEY}&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/movie/top_rated?api_key=${TMDB_API_KEY}&language=${appLang}`).then(r => r.json()),
              fetch(`${TMDB_BASE_URL}/tv/popular?api_key=${TMDB_API_KEY}&language=${appLang}`).then(r => r.json())
            ]);

            const mapData = (items, type) => items.results ? items.results.map(m => ({
              id: m.id,
              Title: m.title || m.name,
              Year: (m.release_date || m.first_air_date || 'N/A').substring(0, 4),
              Poster: m.poster_path ? `${TMDB_IMG_BASE}${m.poster_path}` : 'N/A',
              Type: type,
              imdbRating: m.vote_average ? m.vote_average.toFixed(1) : 'N/A'
            })) : [];

            setHomeData([
              { title: appLang === 'ru-RU' ? 'В Тренде (Фильмы)' : 'Trending Movies Now', movies: mapData(trendingMovies, 'movie') },
              { title: appLang === 'ru-RU' ? 'Популярные Сериалы' : 'Binge-Worthy TV Shows', movies: mapData(trendingTV, 'series') },
              { title: appLang === 'ru-RU' ? 'Высокий Рейтинг' : 'Top Rated Movies', movies: mapData(topMovies, 'movie') },
              { title: appLang === 'ru-RU' ? 'Обсуждаемые Сериалы' : 'Popular TV Shows', movies: mapData(popTV, 'series') }
            ]);
          } catch (err) {
            console.error('Home data failed', err);
          } finally {
            setLoadingHome(false);
          }
        };

        const fetchSearch = async (pageNum, isNew = false, typeParam = null, queryParam = null) => {
          if (isNew) { setLoading(true); setMovies([]); }
          setError(null);
          
          const currentType = typeParam || searchType;
          const activeQuery = queryParam || debouncedQuery;
          const tmdbType = currentType === 'series' ? 'tv' : 'movie';

          try {
            const response = await fetch(`${TMDB_BASE_URL}/search/${tmdbType}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(activeQuery)}&page=${pageNum}&language=${appLang}`);
            const data = await response.json();

            if (data.results && data.results.length > 0) {
              const formatted = data.results.map(m => ({
                 id: m.id, Title: m.title || m.name, Year: (m.release_date || m.first_air_date || 'N/A').substring(0, 4),
                 Poster: m.poster_path ? `${TMDB_IMG_BASE}${m.poster_path}` : 'N/A', Type: currentType, imdbRating: m.vote_average ? m.vote_average.toFixed(1) : 'N/A'
              }));
              setMovies(prev => isNew ? formatted : [...prev, ...formatted]);
              setHasMore(pageNum < data.total_pages); 
            } else {
              if (isNew) { setMovies([]); setError(appLang === 'ru-RU' ? 'Ничего не найдено.' : 'No titles found.'); setHasMore(false); } 
              else { setHasMore(false); }
            }
          } catch (err) {
            if (isNew) setError('Failed to fetch data.');
          } finally {
            setLoading(false);
          }
        };

        const loadGenreData = async (pageNum, type, genre, isNew = false) => {
           if (isNew) { setLoading(true); setMovies([]); }
           setError(null);
           
           const tmdbType = type === 'series' ? 'tv' : 'movie';
           const genreId = type === 'series' ? TMDB_TV_GENRE_IDS[genre] : TMDB_MOVIE_GENRE_IDS[genre];

           try {
              const res = await fetch(`${TMDB_BASE_URL}/discover/${tmdbType}?api_key=${TMDB_API_KEY}&with_genres=${genreId}&page=${pageNum}&language=${appLang}&sort_by=popularity.desc`);
              const data = await res.json();
              
              if (data.results) {
                 const newItems = data.results.map(m => ({
                    id: m.id, Title: m.title || m.name, Year: (m.release_date || m.first_air_date || 'N/A').substring(0, 4),
                    Poster: m.poster_path ? `${TMDB_IMG_BASE}${m.poster_path}` : 'N/A', Type: type, imdbRating: m.vote_average ? m.vote_average.toFixed(1) : 'N/A'
                 }));
                 setMovies(prev => isNew ? newItems : [...prev, ...newItems]);
                 setHasMore(pageNum < data.total_pages);
              } else {
                 setHasMore(false);
              }
           } catch (err) {
              if (isNew) setError(`Failed to fetch ${genre} titles.`);
           } finally {
              setLoading(false);
           }
        };

        const handleTypeToggle = (type) => {
           setSearchType(type);
           if (!query.trim() && !isHome && browseContext === 'genre') goHome();
        };

        const selectGenre = (type, genre, skipUrlUpdate = false) => {
           setIsHome(false);
           setBrowseContext('genre');
           setActiveGenre({ type, genre });
           setQuery(''); 
           setDebouncedQuery('');
           setSelectedMovie(null); 
           setPage(1);
           loadGenreData(1, type, genre, true);
           if (!skipUrlUpdate) updateURL({ g: genre, type });
        };

        const loadMoreData = useCallback(() => {
           if (loading || !hasMore) return;
           const nextPage = page + 1;
           setPage(nextPage);

           if (browseContext === 'search') {
              fetchSearch(nextPage, false, searchType, debouncedQuery);
           } else if (browseContext === 'genre') {
              loadGenreData(nextPage, activeGenre.type, activeGenre.genre, false);
           } else if (browseContext === 'home') {
              loadHomeGridData(nextPage, false);
           }
        }, [page, loading, hasMore, browseContext, activeGenre, debouncedQuery, searchType, appLang]);

        const lastElementRef = useInfiniteScroll(loadMoreData, hasMore, loading);

        const playMovie = async (movie, skipUrlUpdate = false) => {
          setSelectedMovie(movie);
          setIsHome(false);
          setSelectedEpisodeData(null); 
          window.scrollTo({ top: 0, behavior: 'smooth' });

          if (!skipUrlUpdate) updateURL({ v: movie.id, type: movie.Type });

          if (movie.Type === 'series') fetchTVSeasons(movie.id);
        };

        const fetchTVSeasons = async (tmdbID) => {
          setLoadingEpisodes(true);
          try {
            const res = await fetch(`${TMDB_BASE_URL}/tv/${tmdbID}?api_key=${TMDB_API_KEY}&language=${appLang}`);
            const showData = await res.json();
            
            const validSeasons = showData.seasons.filter(s => s.season_number > 0);
            setShowSeasons(validSeasons.map(s => s.season_number));
            
            if (validSeasons.length > 0) {
              const firstValidSeason = validSeasons[0].season_number;
              setSelectedSeason(firstValidSeason);
              fetchEpisodesForSeason(tmdbID, firstValidSeason);
            } else {
              setShowEpisodes([]);
            }
          } catch (err) {
            setShowEpisodes([]);

                    {!hasMore && movies.length > 0 && !loading && (
                       <div className="py-16 text-center text-zinc-600 font-bold uppercase tracking-widest text-sm">
                          {appLang === 'ru-RU' ? 'Конец Списка' : 'End of Results'}
                       </div>
                    )}
                  </div>
                )}

                {/* INITIAL LOADING & ERROR STATES */}
                {loading && movies.length === 0 && (
                  <div className="flex flex-col items-center justify-center py-32">
                    <div className="relative w-20 h-20">
                      <div className="absolute inset-0 border-4 border-zinc-800 rounded-full"></div>
                      <div className="absolute inset-0 border-4 border-red-600 rounded-full border-t-transparent animate-spin"></div>
                    </div>
                  </div>
                )}

                {error && !loading && movies.length === 0 && (
                  <div className="flex flex-col items-center justify-center py-24 text-center">
                    <AlertCircle className="w-20 h-20 text-zinc-800 mb-6" />
                    <h3 className="text-3xl font-black text-white mb-3">{appLang === 'ru-RU' ? 'Ничего не найдено' : 'No Titles Found'}</h3>
                    <p className="text-zinc-500 font-medium max-w-md">{error}</p>
                  </div>
                )}
              </main>
            </div>
          </React.Fragment>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
