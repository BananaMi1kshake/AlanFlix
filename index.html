<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlanFlix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      // This perfectly configures Babel to run React purely in the browser without any errors
      Babel.registerPreset("react-classic", {
        presets: [
          [Babel.availablePresets["react"], { runtime: "classic" }]
        ]
      });
    </script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap');

      body {
        background-color: #09090b;
        color: white;
        font-family: 'Inter', sans-serif;
        margin: 0;
        overflow-x: hidden;
      }

      /* --- Intro Animation Styles --- */
      .intro-overlay {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        perspective: 1000px;
      }

      .intro-light-beam {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 200vw;
        height: 200vh;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(229,9,20,0.4) 0%, rgba(0,0,0,1) 60%);
        opacity: 0;
        animation: beamFlash 4.5s ease-in-out forwards;
      }

      .intro-text-container {
        position: relative;
        transform-style: preserve-3d;
      }

      .intro-text {
        font-family: 'Bebas Neue', cursive;
        /* FIX: Mobile responsive font size using clamp */
        font-size: clamp(4rem, 15vw, 12rem); 
        color: transparent;
        -webkit-text-stroke: 4px #e50914;
        text-transform: uppercase;
        /* FIX: Removed letter-spacing animation to prevent severe CPU freezing/jank */
        animation: cinematicText 4.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        position: relative;
        z-index: 10;
      }

      /* Reduce stroke width on mobile for legibility */
      @media (max-width: 768px) {
        .intro-text {
          -webkit-text-stroke: 2px #e50914;
        }
      }

      .intro-text::before {
        content: 'ALANFLIX';
        position: absolute;
        left: 0;
        top: 0;
        color: #e50914;
        filter: blur(3px); /* Sharp glow */
        opacity: 0;
        animation: textGlow 4.5s ease-in-out forwards;
        z-index: -1;
      }

      .intro-particles {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, #fff 1px, transparent 1px);
        background-size: 50px 50px;
        opacity: 0.1;
        animation: particleZoom 4.5s linear forwards;
      }

      /* FIX: Use only hardware-accelerated properties (transform, opacity) */
      @keyframes cinematicText {
        0% { transform: translateZ(-2000px) rotateX(45deg); opacity: 0; }
        30% { transform: translateZ(0) rotateX(0deg); opacity: 1; color: transparent; }
        50% { color: #e50914; text-shadow: 0 0 5px rgba(229,9,20,0.5), 0 0 10px rgba(229,9,20,0.5); transform: translateZ(50px) scale(1.05); }
        85% { transform: translateZ(100px) scale(1.15); opacity: 1; filter: blur(0px); }
        100% { transform: translateZ(1000px) scale(3); opacity: 0; filter: blur(2px); }
      }

      @keyframes textGlow {
        0%, 30% { opacity: 0; }
        50%, 80% { opacity: 0.9; }
        100% { opacity: 0; }
      }

      @keyframes beamFlash {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
      }

      @keyframes particleZoom {
        0% { transform: scale(1) translateZ(-500px); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: scale(5) translateZ(500px); opacity: 0; }
      }

      /* --- UI Styles --- */
      .glass-nav {
        background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        backdrop-filter: blur(4px);
      }

      .movie-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .movie-card:hover {
        transform: scale(1.05) translateY(-10px);
        z-index: 10;
        box-shadow: 0 20px 40px rgba(229, 9, 20, 0.2);
      }
      
      .poster-overlay {
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .movie-card:hover .poster-overlay {
        opacity: 1;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #09090b; }
      ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #e50914; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
      const { useState, useEffect } = React;

      // Inline SVG Icons to prevent import errors in browser
      const Search = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>);
      const Play = ({ className, fill }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
      const X = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
      const Film = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>);
      const AlertCircle = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>);

      const OMDB_API_KEY = 'dd555970';

      const STREAMING_SERVERS = [
        { name: 'VidLink', movie: 'https://vidlink.pro/movie/', tv: 'https://vidlink.pro/tv/' },
        { name: 'SuperEmbed', movie: 'https://superembed.stream/movie/', tv: 'https://superembed.stream/tv/' },
        { name: 'VidSrc ME', movie: 'https://vidsrc.me/embed/movie/', tv: 'https://vidsrc.me/embed/tv/' },
        { name: 'Embed SU', movie: 'https://embed.su/embed/movie/', tv: 'https://embed.su/embed/tv/' },
        { name: 'VidSrc PRO', movie: 'https://vidsrc.pro/embed/movie/', tv: 'https://vidsrc.pro/embed/tv/' },
        { name: 'VidSrc IN', movie: 'https://vidsrc.in/embed/movie/', tv: 'https://vidsrc.in/embed/tv/' },
        { name: 'AutoEmbed', movie: 'https://autoembed.co/movie/imdb/', tv: 'https://autoembed.co/tv/imdb/' },
        { name: 'VidSrc NET', movie: 'https://vidsrc.net/embed/movie/', tv: 'https://vidsrc.net/embed/tv/' },
        { name: 'Smashy', movie: 'https://embed.smashystream.com/playere.php?imdb=', tv: 'https://embed.smashystream.com/playere.php?imdb=' },
        { name: 'MultiEmbed', movie: 'https://multiembed.mov/directstream.php?video_id=', tv: 'https://multiembed.mov/directstream.php?video_id=' },
        { name: 'VidSrc RU', movie: 'https://vidsrc-embed.ru/embed/movie/', tv: 'https://vidsrc-embed.ru/embed/tv/' },
        { name: 'VidSrc CC', movie: 'https://vidsrc.cc/v2/embed/movie/', tv: 'https://vidsrc.cc/v2/embed/tv/' }
      ];

      function App() {
        const [introFinished, setIntroFinished] = useState(false);
        const [query, setQuery] = useState('Avengers');
        const [searchType, setSearchType] = useState('movie'); // Track 'movie' or 'series'
        const [movies, setMovies] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [selectedMovie, setSelectedMovie] = useState(null);
        const [activeServer, setActiveServer] = useState(STREAMING_SERVERS[0]);

        // Run intro animation sequence
        useEffect(() => {
          const timer = setTimeout(() => {
            setIntroFinished(true);
          }, 4500); 
          
          return () => clearTimeout(timer);
        }, []);

        // Initial load and re-search when the type is toggled
        useEffect(() => {
          if (introFinished) {
            handleSearch();
          }
        }, [introFinished, searchType]);

        const handleSearch = async (e) => {
          if (e) e.preventDefault();
          if (!query.trim()) return;

          setLoading(true);
          setError(null);

          try {
            // Include dynamic searchType in the API call
            const response = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&s=${encodeURIComponent(query)}&type=${searchType}`);
            const data = await response.json();

            if (data.Response === 'True') {
              setMovies(data.Search);
            } else {
              setMovies([]);
              setError(data.Error);
            }
          } catch (err) {
            setError('Failed to fetch data from OMDB API. Check your connection.');
          } finally {
            setLoading(false);
          }
        };

        const playMovie = (movie) => {
          setSelectedMovie(movie);
          setActiveServer(STREAMING_SERVERS[0]);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const handleNextServer = () => {
          const currentIndex = STREAMING_SERVERS.findIndex(s => s.name === activeServer.name);
          const nextIndex = (currentIndex + 1) % STREAMING_SERVERS.length;
          setActiveServer(STREAMING_SERVERS[nextIndex]);
        };

        const closePlayer = () => {
          setSelectedMovie(null);
        };

        return (
          <React.Fragment>
            {/* OVER-THE-TOP INTRO ANIMATION */}
            {!introFinished && (
              <div className="intro-overlay">
                <div className="intro-light-beam"></div>
                <div className="intro-particles"></div>
                <div className="intro-text-container">
                  <h1 className="intro-text">ALANFLIX</h1>
                </div>
              </div>
            )}

            {/* MAIN APPLICATION */}
            <div className={`min-h-screen bg-zinc-950 transition-opacity duration-1000 ${introFinished ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
              
              <nav className="fixed top-0 w-full z-50 glass-nav px-4 md:px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-3 md:gap-4">
                <div className="flex items-center gap-2 cursor-pointer" onClick={() => setSelectedMovie(null)}>
                  <Film className="text-red-600 w-7 h-7 md:w-8 md:h-8" />
                  <span className="font-['Bebas_Neue'] text-2xl md:text-3xl tracking-wide text-red-600 drop-shadow-[0_0_10px_rgba(229,9,20,0.5)]">
                    ALANFLIX
                  </span>
                </div>

                <div className="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                  {/* Media Type Toggle */}
                  <div className="flex bg-zinc-900/80 border border-zinc-800 rounded-full p-1">
                    <button
                      onClick={() => setSearchType('movie')}
                      className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${searchType === 'movie' ? 'bg-red-600 text-white shadow-[0_0_10px_rgba(229,9,20,0.3)]' : 'text-zinc-400 hover:text-white'}`}
                    >
                      Movies
                    </button>
                    <button
                      onClick={() => setSearchType('series')}
                      className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${searchType === 'series' ? 'bg-red-600 text-white shadow-[0_0_10px_rgba(229,9,20,0.3)]' : 'text-zinc-400 hover:text-white'}`}
                    >
                      TV Shows
                    </button>
                  </div>

                  <form onSubmit={handleSearch} className="relative w-full sm:w-80 md:w-96">
                    <input
                      type="text"
                      value={query}
                      onChange={(e) => setQuery(e.target.value)}
                      placeholder={`Search ${searchType === 'series' ? 'TV shows' : 'movies'}...`}
                      className="w-full bg-zinc-900/80 border border-zinc-800 text-white rounded-full py-2.5 pl-5 pr-12 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-all placeholder-zinc-500"
                    />
                    <button 
                      type="submit" 
                      className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-zinc-400 hover:text-red-500 transition-colors"
                    >
                      <Search className="w-5 h-5" />
                    </button>
                  </form>
                </div>
              </nav>

              {/* Increased top padding to accommodate the new dual-row nav on mobile */}
              <main className="pt-48 sm:pt-36 md:pt-28 pb-12 px-4 sm:px-6 lg:px-12 max-w-screen-2xl mx-auto">
                
                {/* Active Player Section */}
                {selectedMovie && (
                  <div className="w-full mb-12 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-3xl font-bold text-white flex items-center gap-3">
                        <span className="w-1.5 h-8 bg-red-600 rounded-full"></span>
                        {selectedMovie.Title} <span className="text-zinc-500 font-normal">({selectedMovie.Year})</span>
                      </h2>
                      <button 
                        onClick={closePlayer}
                        className="flex items-center gap-2 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-white rounded-full transition-colors"
                      >
                        <X className="w-4 h-4" /> Close Player
                      </button>
                    </div>

                    <div className="bg-zinc-900 rounded-lg p-4 mb-4 border border-zinc-800">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-3">
                        <span className="text-sm font-medium text-zinc-400">Streaming Sources ({STREAMING_SERVERS.length} available):</span>
                        <button 
                          onClick={handleNextServer}
                          className="flex items-center justify-center gap-2 px-4 py-1.5 bg-red-600 hover:bg-red-700 text-white text-sm font-bold rounded-full transition-colors shadow-[0_0_15px_rgba(229,9,20,0.3)]"
                        >
                          <Play className="w-4 h-4" fill="currentColor" /> Try Next Server
                        </button>
                      </div>
                      <div className="flex flex-wrap items-center gap-2">
                        {STREAMING_SERVERS.map((server) => (
                          <button
                            key={server.name}
                            onClick={() => setActiveServer(server)}
                            className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all duration-300 ${
                              activeServer.name === server.name 
                                ? 'bg-white text-black shadow-[0_0_10px_rgba(255,255,255,0.3)] scale-105' 
                                : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700 hover:text-white'
                            }`}
                          >
                            {server.name}
                          </button>
                        ))}
                      </div>
                    </div>
                    
                    {}
                    <div className="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-[0_0_50px_rgba(229,9,20,0.15)] ring-1 ring-zinc-800">
                      <div className="absolute inset-0 flex items-center justify-center -z-10">
                         <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600"></div>
                      </div>
                      <iframe
                        key={activeServer.name + selectedMovie.imdbID}
                        className="absolute inset-0 w-full h-full"
                        src={`${selectedMovie.Type === 'series' ? activeServer.tv : activeServer.movie}${selectedMovie.imdbID}`}
                        allowFullScreen
                        frameBorder="0"
                        title="Video Player"
                        referrerPolicy="origin"
                      />
                    </div>
                  </div>
                )}

                {/* Search Results Title */}
                {!selectedMovie && !loading && movies.length > 0 && (
                   <h3 className="text-xl font-medium text-zinc-400 mb-6 flex items-center gap-2">
                     Results for <span className="text-white font-bold">"{query}"</span>
                   </h3>
                )}

                {/* Loading State */}
                {loading && (
                  <div className="flex flex-col items-center justify-center py-32">
                    <div className="relative w-20 h-20">
                      <div className="absolute inset-0 border-4 border-zinc-800 rounded-full"></div>
                      <div className="absolute inset-0 border-4 border-red-600 rounded-full border-t-transparent animate-spin"></div>
                    </div>
                    <p className="mt-6 text-zinc-400 font-medium tracking-widest uppercase">Fetching DB...</p>
                  </div>
                )}

                {/* Error State */}
                {error && !loading && (
                  <div className="flex flex-col items-center justify-center py-24 text-center px-4">
                    <AlertCircle className="w-16 h-16 text-zinc-700 mb-4" />
                    <h3 className="text-2xl font-bold text-white mb-2">No Movies Found</h3>
                    <p className="text-zinc-500">{error}</p>
                  </div>
                )}

                {/* Movie Grid - FIX: Improved mobile grid gaps to look less cramped */}
                {!loading && !error && (
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6 gap-y-8 sm:gap-y-10">
                    {movies.map((movie) => (
                      <div 
                        key={movie.imdbID} 
                        className="movie-card relative group cursor-pointer rounded-lg overflow-hidden bg-zinc-900"
                        onClick={() => playMovie(movie)}
                      >
                        <div className="aspect-[2/3] w-full relative">
                          {movie.Poster !== 'N/A' ? (
                            <img 
                              src={movie.Poster} 
                              alt={movie.Title}
                              className="w-full h-full object-cover"
                              loading="lazy"
                            />
                          ) : (
                            <div className="w-full h-full flex flex-col items-center justify-center bg-zinc-800 text-zinc-500 p-4 text-center">
                              <Film className="w-12 h-12 mb-2 opacity-50" />
                              <span className="text-xs font-semibold">NO POSTER</span>
                            </div>
                          )}
                          
                          {/* Hover Overlay */}
                          <div className="poster-overlay absolute inset-0 flex flex-col items-center justify-center backdrop-blur-sm">
                            <div className="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center transform scale-50 group-hover:scale-100 transition-transform duration-300 shadow-[0_0_30px_rgba(229,9,20,0.8)]">
                              <Play className="w-6 h-6 text-white ml-1 pl-0.5" fill="currentColor" />
                            </div>
                            <span className="mt-4 font-bold text-sm tracking-wider uppercase opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-100">
                              Play Now
                            </span>
                          </div>
                        </div>
                        
                        {/* Card Info */}
                        <div className="p-3">
                          <h4 className="text-white font-semibold truncate text-sm" title={movie.Title}>
                            {movie.Title}
                          </h4>
                          <p className="text-red-500 text-xs font-bold mt-1">
                            {movie.Year} <span className="text-zinc-600 font-normal ml-1 capitalize">· {movie.Type === 'series' ? 'TV Show' : movie.Type}</span>
                          </p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </main>
            </div>
          </React.Fragment>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
