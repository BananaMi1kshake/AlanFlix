<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlanFlix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      // Force Babel to use the classic JSX runtime to prevent the "Cannot use import statement" crash
      Babel.registerPreset('react-classic', {
        presets: [
          [Babel.availablePresets.react, { runtime: 'classic' }]
        ]
      });
    </script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;800&display=swap');

      body {
        background-color: #09090b;
        color: white;
        font-family: 'Inter', sans-serif;
        margin: 0;
        overflow-x: hidden;
      }

      /* --- Intro Animation Styles --- */
      .intro-overlay {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        perspective: 1000px;
      }

      .intro-light-beam {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 200vw;
        height: 200vh;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(229,9,20,0.4) 0%, rgba(0,0,0,1) 60%);
        opacity: 0;
        animation: beamFlash 4.5s ease-in-out forwards;
      }

      .intro-text-container {
        position: relative;
        transform-style: preserve-3d;
      }

      .intro-text {
        font-family: 'Bebas Neue', cursive;
        font-size: 6rem; /* Mobile optimized base size */
        color: transparent;
        -webkit-text-stroke: 2px #e50914;
        text-transform: uppercase;
        animation: cinematicText 4.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        position: relative;
        z-index: 10;
      }

      @media (min-width: 768px) {
        .intro-text {
          font-size: 12rem;
          -webkit-text-stroke: 4px #e50914;
        }
      }

      .intro-text::before {
        content: 'ALANFLIX';
        position: absolute;
        left: 0;
        top: 0;
        color: #e50914;
        filter: blur(3px);
        opacity: 0;
        animation: textGlow 4.5s ease-in-out forwards;
        z-index: -1;
      }

      .intro-particles {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, #fff 1px, transparent 1px);
        background-size: 50px 50px;
        opacity: 0.1;
        animation: particleZoom 4.5s linear forwards;
      }

      @keyframes cinematicText {
        0% { transform: translateZ(-2000px) rotateX(45deg); opacity: 0; }
        30% { transform: translateZ(0) rotateX(0deg); opacity: 1; color: transparent; }
        50% { color: #e50914; text-shadow: 0 0 5px #e50914, 0 0 10px #e50914; transform: translateZ(50px) scale(1.05); }
        85% { transform: translateZ(100px) scale(1.15); opacity: 1; filter: blur(0px); }
        100% { transform: translateZ(1000px) scale(3); opacity: 0; filter: blur(2px); }
      }

      @keyframes textGlow {
        0%, 30% { opacity: 0; }
        50%, 80% { opacity: 0.9; }
        100% { opacity: 0; }
      }

      @keyframes beamFlash {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
      }

      @keyframes particleZoom {
        0% { transform: scale(1) translateZ(-500px); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: scale(5) translateZ(500px); opacity: 0; }
      }

      /* --- UI Styles --- */
      .glass-nav {
        background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        backdrop-filter: blur(4px);
      }

      .movie-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .movie-card:hover {
        transform: scale(1.05) translateY(-10px);
        z-index: 10;
        box-shadow: 0 20px 40px rgba(229, 9, 20, 0.2);
      }
      
      .poster-overlay {
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .movie-card:hover .poster-overlay {
        opacity: 1;
      }

      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #e50914; }

      /* Hide default scrollbar but keep functionality */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
      const { useState, useEffect, useRef, useCallback } = React;

      // Inline SVG Icons
      const Search = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>);
      const Play = ({ className, fill }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
      const X = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
      const Film = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>);
      const AlertCircle = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>);
      const ChevronDown = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>);
      const Star = ({ className, fill }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>);

      const OMDB_API_KEY = 'dd555970';

      const MOVIE_GENRES = ['Action', 'Comedy', 'Sci-Fi', 'Horror', 'Romance', 'Thriller', 'Drama', 'Animation'];
      const TV_GENRES = ['Action', 'Comedy', 'Science-Fiction', 'Horror', 'Romance', 'Thriller', 'Drama', 'Anime'];

      const STREAMING_SERVERS = [
        { name: 'VidLink', url: 'https://vidlink.pro/movie/' },
        { name: 'SuperEmbed', url: 'https://superembed.stream/movie/' },
        { name: 'VidSrc ME', url: 'https://vidsrc.me/embed/movie/' },
        { name: 'Embed SU', url: 'https://embed.su/embed/movie/' },
        { name: 'VidSrc PRO', url: 'https://vidsrc.pro/embed/movie/' },
        { name: 'VidSrc IN', url: 'https://vidsrc.in/embed/movie/' },
        { name: 'AutoEmbed', url: 'https://autoembed.co/movie/imdb/' },
        { name: 'VidSrc NET', url: 'https://vidsrc.net/embed/movie/' },
        { name: 'Smashy', url: 'https://embed.smashystream.com/playere.php?imdb=' },
        { name: 'MultiEmbed', url: 'https://multiembed.mov/directstream.php?video_id=' },
        { name: 'VidSrc RU', url: 'https://vidsrc-embed.ru/embed/movie/' },
        { name: 'VidSrc CC', url: 'https://vidsrc.cc/v2/embed/movie/' }
      ];

      const TV_SERVERS = [
        { name: 'VidLink', url: 'https://vidlink.pro/tv/' },
        { name: 'SuperEmbed', url: 'https://superembed.stream/tv/' },
        { name: 'VidSrc ME', url: 'https://vidsrc.me/embed/tv/' },
        { name: 'Embed SU', url: 'https://embed.su/embed/tv/' },
        { name: 'VidSrc PRO', url: 'https://vidsrc.pro/embed/tv/' },
        { name: 'VidSrc IN', url: 'https://vidsrc.in/embed/tv/' },
        { name: 'AutoEmbed', url: 'https://autoembed.co/tv/imdb/' },
        { name: 'VidSrc NET', url: 'https://vidsrc.net/embed/tv/' },
        { name: 'MultiEmbed', url: 'https://multiembed.mov/directstream.php?video_id=' },
        { name: 'VidSrc CC', url: 'https://vidsrc.cc/v2/embed/tv/' }
      ];

      const getTVEmbedUrl = (serverUrl, imdbId, season, episode) => {
        if (serverUrl.includes('autoembed.co')) return `${serverUrl}${imdbId}-${season}-${episode}`;
        if (serverUrl.includes('vidlink.pro') || serverUrl.includes('superembed.stream') || serverUrl.includes('vidsrc')) return `${serverUrl}${imdbId}?season=${season}&episode=${episode}`;
        if (serverUrl.includes('embed.su')) return `${serverUrl}${imdbId}/${season}/${episode}`;
        return `${serverUrl}${imdbId}&s=${season}&e=${episode}`; 
      };

      // Custom Hook for Infinite Scrolling
      function useInfiniteScroll(callback, hasMore, loading) {
        const observer = useRef();
        const lastElementRef = useCallback(node => {
          if (loading) return;
          if (observer.current) observer.current.disconnect();
          observer.current = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && hasMore) {
              callback();
            }
          }, { rootMargin: '200px' }); // Fire slightly before hitting the bottom
          if (node) observer.current.observe(node);
        }, [loading, hasMore, callback]);
        return lastElementRef;
      }

      function App() {
        // Global App States
        const [introFinished, setIntroFinished] = useState(false);
        const [isHome, setIsHome] = useState(true);
        const [browseContext, setBrowseContext] = useState('search'); // 'search' or 'genre'
        const [activeGenre, setActiveGenre] = useState(null); // { type, genre }
        
        // Data States
        const [query, setQuery] = useState('');
        const [searchType, setSearchType] = useState('movie');
        const [movies, setMovies] = useState([]);
        const [homeData, setHomeData] = useState([]);
        const [loading, setLoading] = useState(true);
        const [loadingHome, setLoadingHome] = useState(true);
        const [error, setError] = useState(null);
        
        // Infinite Scroll Pagination States
        const [page, setPage] = useState(1);
        const [hasMore, setHasMore] = useState(false);

        // Player & Details States
        const [selectedMovie, setSelectedMovie] = useState(null);
        const [activeServer, setActiveServer] = useState(STREAMING_SERVERS[0]);
        const [showEpisodes, setShowEpisodes] = useState([]);
        const [showSeasons, setShowSeasons] = useState([]);
        const [selectedSeason, setSelectedSeason] = useState(1);
        const [loadingEpisodes, setLoadingEpisodes] = useState(false);
        const [selectedEpisodeData, setSelectedEpisodeData] = useState(null); 

        // Run intro animation sequence
        useEffect(() => {
          const timer = setTimeout(() => {
            setIntroFinished(true);
          }, 4500); 
          return () => clearTimeout(timer);
        }, []);

        // Initial load for Home Page data
        useEffect(() => {
          if (introFinished) fetchHomeData();
        }, [introFinished]);

        const fetchHomeData = async () => {
          setLoadingHome(true);
          try {
            const [ytsTrending, tvMaze, ytsNew, ytsTop] = await Promise.all([
              fetch('https://yts.mx/api/v2/list_movies.json?sort_by=download_count&limit=25').then(res => res.json()),
              fetch('https://api.tvmaze.com/shows').then(res => res.json()),
              fetch('https://yts.mx/api/v2/list_movies.json?sort_by=year&limit=25').then(res => res.json()),
              fetch('https://yts.mx/api/v2/list_movies.json?sort_by=rating&limit=25').then(res => res.json())
            ]);

            const mapYTS = (movies) => movies ? movies.map(m => ({
              Title: m.title, Year: m.year, Poster: m.large_cover_image || 'N/A', imdbID: m.imdb_code, Type: 'movie', imdbRating: m.rating ? m.rating.toFixed(1) : 'N/A'
            })) : [];

            const mapTV = (shows) => shows.map(show => ({
              Title: show.name, Year: show.premiered ? show.premiered.substring(0, 4) : 'N/A', 
              Poster: show.image ? show.image.medium : 'N/A', imdbID: show.externals?.imdb, Type: 'series', imdbRating: show.rating?.average ? show.rating.average.toFixed(1) : 'N/A'
            })).filter(s => s.imdbID).slice(0, 25);

            const allTV = tvMaze.sort((a, b) => b.weight - a.weight);

            setHomeData([
              { title: 'Trending Movies Now', movies: mapYTS(ytsTrending.data.movies) },
              { title: 'Binge-Worthy TV Shows', movies: mapTV(allTV) },
              { title: 'New Releases', movies: mapYTS(ytsNew.data.movies) },
              { title: 'Top Rated Movies', movies: mapYTS(ytsTop.data.movies) },
              { title: 'Action Packed TV', movies: mapTV(allTV.filter(s => s.genres.includes('Action'))) },
              { title: 'Sci-Fi Masterpieces', movies: mapYTS(ytsTop.data.movies?.filter(m => m.genres?.includes('Sci-Fi'))) },
              { title: 'Comedy Series', movies: mapTV(allTV.filter(s => s.genres.includes('Comedy'))) }
            ]);
          } catch (err) {
            console.warn('Live API blocked by ISP/Adblocker. Activating OMDB Fallback...', err);
            
            // Fallback to OMDB curated lists if YTS or TVMaze fails
            try {
              const HOME_CATEGORIES = [
                { title: 'Trending Movies Now', pool: ['tt15398776', 'tt15239678', 'tt10366206', 'tt1517268', 'tt9362722', 'tt1745960', 'tt10872600', 'tt1877830', 'tt1630029', 'tt23289004', 'tt1160419', 'tt0468569'] },
                { title: 'Binge-Worthy TV Shows', pool: ['tt0903747', 'tt0944947', 'tt4574334', 'tt1190634', 'tt7660850', 'tt11280740', 'tt0475784', 'tt0386676', 'tt0118401', 'tt0898266', 'tt0108778', 'tt0285331'] },
                { title: 'Sci-Fi Masterpieces', pool: ['tt0816692', 'tt0133093', 'tt1375666', 'tt1856101', 'tt2543164', 'tt0088763', 'tt0103064', 'tt0076759', 'tt0108052', 'tt0120804', 'tt0113568', 'tt0499549'] },
                { title: 'Animated Hits', pool: ['tt4633694', 'tt0245429', 'tt0910970', 'tt0114709', 'tt2380307', 'tt1049413', 'tt2953050', 'tt0119698', 'tt0432283', 'tt0317219', 'tt0102926', 'tt0112462'] }
              ];
              
              const promises = HOME_CATEGORIES.map(async (cat) => {
                const shuffledIds = [...cat.pool].sort(() => 0.5 - Math.random()).slice(0, 10);
                const moviePromises = shuffledIds.map(async (id) => {
                  const response = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&i=${id}`);
                  return await response.json();
                });
                const moviesData = await Promise.all(moviePromises);
                
                // Map the OMDB fallback to explicitly include the ratings!
                const validMovies = moviesData.filter(m => m.Response === 'True').map(m => ({
                    Title: m.Title, Year: m.Year, Poster: m.Poster, imdbID: m.imdbID, Type: m.Type, imdbRating: m.imdbRating
                }));
                return { title: cat.title, movies: validMovies };
              });
              
              const results = await Promise.all(promises);
              setHomeData(results);
            } catch (fallbackErr) {
               console.error('OMDB Fallback also failed', fallbackErr);
            }
          } finally {
            setLoadingHome(false);
          }
        };

        // Standard OMDB Search Fetch
        const fetchOMDBSearch = async (pageNum, isNew = false, typeParam = null) => {
          if (isNew) { setLoading(true); setMovies([]); }
          setError(null);
          
          const currentType = typeParam || searchType;

          try {
            const response = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&s=${encodeURIComponent(query)}&type=${currentType}&page=${pageNum}`);
            const data = await response.json();

            if (data.Response === 'True') {
              // Fetch detailed IMDB ratings for each search result
              const detailedMoviesPromises = data.Search.map(async (movie) => {
                  try {
                      const detailRes = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&i=${movie.imdbID}`);
                      const detailData = await detailRes.json();
                      return { ...movie, imdbRating: detailData.imdbRating && detailData.imdbRating !== 'N/A' ? detailData.imdbRating : null };
                  } catch(e) {
                      return movie;
                  }
              });
              
              const detailedMovies = await Promise.all(detailedMoviesPromises);

              setMovies(prev => isNew ? detailedMovies : [...prev, ...detailedMovies]);
              const total = parseInt(data.totalResults, 10);
              setHasMore((pageNum * 10) < total); 
            } else {
              if (isNew) { setMovies([]); setError(data.Error); setHasMore(false); } 
              else { setHasMore(false); }
            }
          } catch (err) {
            if (isNew) setError('Failed to fetch data. Check your connection.');
          } finally {
            setLoading(false);
          }
        };

        // Live API Genre Endless Fetch
        const loadGenreData = async (pageNum, type, genre, isNew = false) => {
           if (isNew) { setLoading(true); setMovies([]); }
           setError(null);
           try {
              let newItems = [];
              let moreAvailable = true;

              if (type === 'movie') {
                 try {
                     const res = await fetch(`https://yts.mx/api/v2/list_movies.json?genre=${genre.toLowerCase()}&limit=20&page=${pageNum}`);
                     if (!res.ok) throw new Error("YTS API Blocked");
                     const data = await res.json();
                     if (data.data?.movies) {
                        newItems = data.data.movies.map(m => ({
                           Title: m.title, Year: m.year, Poster: m.large_cover_image || m.medium_cover_image || 'N/A', imdbID: m.imdb_code, Type: 'movie', imdbRating: m.rating ? m.rating.toFixed(1) : 'N/A'
                        }));
                        moreAvailable = data.data.movies.length === 20;
                     } else {
                        moreAvailable = false;
                     }
                 } catch (ytsErr) {
                     console.warn('YTS is blocked, using OMDb Genre Keyword Fallback');
                     // OMDb Fallback for Genres (using genre word as search query)
                     const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&s=${encodeURIComponent(genre)}&type=movie&page=${pageNum}`);
                     const data = await res.json();
                     if (data.Response === 'True') {
                         const detailedMoviesPromises = data.Search.map(async (movie) => {
                             try {
                                 const detailRes = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&i=${movie.imdbID}`);
                                 const detailData = await detailRes.json();
                                 return { ...movie, imdbRating: detailData.imdbRating && detailData.imdbRating !== 'N/A' ? detailData.imdbRating : null };
                             } catch(e) {
                                 return movie;
                             }
                         });
                         newItems = await Promise.all(detailedMoviesPromises);
                         const total = parseInt(data.totalResults, 10);
                         moreAvailable = (pageNum * 10) < total;
                     } else {
                         moreAvailable = false;
                     }
                 }
              } else {
                 // TVMaze pages start at 0
                 const res = await fetch(`https://api.tvmaze.com/shows?page=${pageNum - 1}`);
                 if (!res.ok) {
                    moreAvailable = false;
                 } else {
                    const data = await res.json();
                    const genreShows = data.filter(s => s.genres.includes(genre) && s.externals?.imdb);
                    newItems = genreShows.map(show => ({
                       Title: show.name, Year: show.premiered ? show.premiered.substring(0, 4) : 'N/A', Poster: show.image?.medium || 'N/A', imdbID: show.externals.imdb, Type: 'series', imdbRating: show.rating?.average ? show.rating.average.toFixed(1) : 'N/A'
                    }));
                    moreAvailable = true; 
                 }
              }
              
              setMovies(prev => isNew ? newItems : [...prev, ...newItems]);
              setHasMore(moreAvailable);
           } catch (err) {
              if (isNew) setError(`Failed to fetch ${genre} titles.`);
           } finally {
              setLoading(false);
           }
        };

        // Actions
        const handleSearchSubmit = (e) => {
          if (e) e.preventDefault();
          if (!query.trim()) return;
          setIsHome(false);
          setBrowseContext('search');
          setActiveGenre(null);
          setPage(1);
          setSelectedMovie(null);
          fetchOMDBSearch(1, true, searchType);
        };

        const handleTypeToggle = (type) => {
           setSearchType(type);
           // Instantly re-run search if user switches tabs while looking at search results
           if (query.trim() && !isHome && browseContext === 'search') {
               setPage(1);
               fetchOMDBSearch(1, true, type);
           }
        };

        const selectGenre = (type, genre) => {
           setIsHome(false);
           setBrowseContext('genre');
           setActiveGenre({ type, genre });
           setQuery(''); 
           setSelectedMovie(null); 
           setPage(1);
           loadGenreData(1, type, genre, true);
        };

        // Infinite Scroll Callback
        const loadMoreData = useCallback(() => {
           if (loading || !hasMore) return;
           const nextPage = page + 1;
           setPage(nextPage);

           if (browseContext === 'search') {
              fetchOMDBSearch(nextPage, false, searchType);
           } else if (browseContext === 'genre') {
              loadGenreData(nextPage, activeGenre.type, activeGenre.genre, false);
           }
        }, [page, loading, hasMore, browseContext, activeGenre, query]);

        const lastElementRef = useInfiniteScroll(loadMoreData, hasMore, loading);

        const playMovie = (movie) => {
          setSelectedMovie(movie);
          setIsHome(false);
          setActiveServer(movie.Type === 'series' ? TV_SERVERS[0] : STREAMING_SERVERS[0]);
          setSelectedEpisodeData(null); 
          window.scrollTo({ top: 0, behavior: 'smooth' });

          if (movie.Type === 'series') fetchTVEpisodes(movie.imdbID);
        };

        const fetchTVEpisodes = async (imdbID) => {
          setLoadingEpisodes(true);
          try {
            const lookupRes = await fetch(`https://api.tvmaze.com/lookup/shows?imdb=${imdbID}`);
            const showData = await lookupRes.json();
            const episodesRes = await fetch(`https://api.tvmaze.com/shows/${showData.id}/episodes`);
            const episodesData = await episodesRes.json();
            
            setShowEpisodes(episodesData);
            const seasons = [...new Set(episodesData.map(ep => ep.season))];
            setShowSeasons(seasons);
            if (seasons.length > 0) setSelectedSeason(seasons[0]);
          } catch (err) {
            console.error('Failed to fetch episodes', err);
            setShowEpisodes([]);
          } finally {
            setLoadingEpisodes(false);
          }
        };

        const playEpisode = (episode) => {
          setSelectedEpisodeData(episode);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const closePlayer = () => {
          setSelectedMovie(null);
          setSelectedEpisodeData(null);
        };

        const getIframeSrc = () => {
          if (!selectedMovie) return '';
          if (selectedMovie.Type === 'series' && selectedEpisodeData) {
            return getTVEmbedUrl(activeServer.url, selectedMovie.imdbID, selectedEpisodeData.season, selectedEpisodeData.number);
          }
          return `${activeServer.url}${selectedMovie.imdbID}`;
        };

        return (
          <React.Fragment>
            {/* INTRO ANIMATION */}
            {!introFinished && (
              <div className="intro-overlay">
                <div className="intro-light-beam"></div>
                <div className="intro-particles"></div>
                <div className="intro-text-container">
                  <h1 className="intro-text">ALANFLIX</h1>
                </div>
              </div>
            )}

            {/* MAIN APPLICATION */}
            <div className={`min-h-screen bg-zinc-950 transition-opacity duration-1000 ${introFinished ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
              
              <nav className="fixed top-0 w-full z-50 glass-nav px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setIsHome(true); setSelectedMovie(null); setQuery(''); }}>
                  <Film className="text-red-600 w-8 h-8" />
                  <span className="font-['Bebas_Neue'] text-3xl tracking-wide text-red-600 drop-shadow-[0_0_10px_rgba(229,9,20,0.5)]">
                    ALANFLIX
                  </span>
                </div>

                <div className="flex flex-col sm:flex-row items-center gap-3 sm:gap-4 w-full md:w-auto">
                  
                  {/* Premium Browse Categories Dropdown */}
                  <div className="relative group z-50 w-full sm:w-auto">
                     <button className="flex items-center justify-center w-full gap-2 text-white font-semibold bg-zinc-900/90 px-5 py-2.5 border border-zinc-800 rounded-full hover:bg-zinc-800 hover:border-zinc-600 transition-all shadow-lg">
                        Browse <ChevronDown className="w-4 h-4 transition-transform duration-300 group-hover:-rotate-180 text-red-500" />
                     </button>
                     
                     <div className="absolute left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0 md:right-0 mt-2 w-[90vw] max-w-sm sm:w-80 bg-zinc-900 border border-zinc-800 rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.8)] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 flex overflow-hidden backdrop-blur-xl">
                        <div className="w-1/2 border-r border-zinc-800 p-2 bg-black/20">
                           <div className="text-[10px] font-black text-red-600 mb-2 px-3 pt-2 uppercase tracking-widest">Movies</div>
                           {MOVIE_GENRES.map(g => (
                              <button key={g} onClick={() => selectGenre('movie', g)} className="block w-full text-left px-3 py-2 text-sm font-medium text-zinc-300 hover:bg-red-600 hover:text-white rounded-lg transition-colors">
                                 {g}
                              </button>
                           ))}
                        </div>
                        <div className="w-1/2 p-2 bg-black/20">
                           <div className="text-[10px] font-black text-red-600 mb-2 px-3 pt-2 uppercase tracking-widest">TV Shows</div>
                           {TV_GENRES.map(g => (
                              <button key={g} onClick={() => selectGenre('series', g)} className="block w-full text-left px-3 py-2 text-sm font-medium text-zinc-300 hover:bg-red-600 hover:text-white rounded-lg transition-colors">
                                 {g}
                              </button>
                           ))}
                        </div>
                     </div>
                  </div>

                  {/* Search Type Toggle */}
                  <div className="flex bg-zinc-900/80 p-1 rounded-full border border-zinc-800 w-full sm:w-auto justify-center">
                     <button type="button" onClick={() => handleTypeToggle('movie')} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all w-1/2 sm:w-auto ${searchType === 'movie' ? 'bg-red-600 text-white shadow-md' : 'text-zinc-400 hover:text-white'}`}>Movies</button>
                     <button type="button" onClick={() => handleTypeToggle('series')} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all w-1/2 sm:w-auto ${searchType === 'series' ? 'bg-red-600 text-white shadow-md' : 'text-zinc-400 hover:text-white'}`}>TV Shows</button>
                  </div>

                  {/* Search Bar */}
                  <form onSubmit={handleSearchSubmit} className="relative w-full md:w-80">
                    <input
                      type="text"
                      value={query}
                      onChange={(e) => setQuery(e.target.value)}
                      placeholder="Search for titles..."
                      className="w-full bg-zinc-900/80 border border-zinc-800 text-white rounded-full py-2.5 pl-5 pr-12 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-all placeholder-zinc-500 shadow-inner"
                    />
                    <button type="submit" className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-zinc-400 hover:text-red-500 transition-colors">
                      <Search className="w-5 h-5" />
                    </button>
                  </form>
                </div>
              </nav>

              <main className="pt-36 pb-12 px-4 sm:px-6 lg:px-12 max-w-[100vw] overflow-x-hidden mx-auto">
                
                {/* Active Player / Details Section */}
                {selectedMovie && (
                  <div className="w-full max-w-7xl mx-auto mb-16 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div className="flex justify-between items-center mb-6">
                      <h2 className="text-2xl sm:text-4xl font-bold text-white flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
                        <div className="flex items-center gap-3">
                          <span className="w-2 h-10 bg-red-600 rounded-full"></span>
                          {selectedMovie.Title} 
                        </div>
                        <span className="text-zinc-500 font-normal text-xl sm:text-3xl flex items-center flex-wrap gap-2 sm:gap-3">
                          ({selectedMovie.Year}) 
                          {selectedMovie.imdbRating && selectedMovie.imdbRating !== 'N/A' && (
                            <span className="flex items-center gap-1.5 text-yellow-500 text-lg font-bold bg-yellow-500/10 px-3 py-0.5 rounded-full border border-yellow-500/20">
                              <Star className="w-4 h-4" fill="currentColor" /> {selectedMovie.imdbRating}
                            </span>
                          )}
                          {selectedEpisodeData && <span className="text-red-500 font-bold bg-red-950/50 px-3 py-1 rounded-full text-lg">S{selectedEpisodeData.season} E{selectedEpisodeData.number}</span>}
                        </span>
                      </h2>
                      <button onClick={closePlayer} className="flex items-center gap-2 px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-white rounded-full transition-colors whitespace-nowrap font-medium">
                        <X className="w-5 h-5" /> <span className="hidden sm:inline">Close</span>
                      </button>
                    </div>

                    {(selectedMovie.Type !== 'series' || selectedEpisodeData) && (
                      <>
                        <div className="bg-zinc-900 rounded-xl p-4 mb-6 border border-zinc-800 shadow-xl">
                          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                            <span className="text-sm font-semibold text-zinc-400 tracking-wide uppercase">Select Mirror:</span>
                            <button 
                              onClick={() => {
                                const list = selectedMovie.Type === 'series' ? TV_SERVERS : STREAMING_SERVERS;
                                setActiveServer(list[(list.findIndex(s => s.name === activeServer.name) + 1) % list.length]);
                              }}
                              className="flex items-center justify-center gap-2 px-5 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-bold rounded-full transition-all shadow-[0_0_20px_rgba(229,9,20,0.4)]"
                            >
                              <Play className="w-4 h-4" fill="currentColor" /> Switch Server
                            </button>
                          </div>
                          <div className="flex flex-wrap items-center gap-2">
                            {(selectedMovie.Type === 'series' ? TV_SERVERS : STREAMING_SERVERS).map((server) => (
                              <button
                                key={server.name}
                                onClick={() => setActiveServer(server)}
                                className={`px-4 py-2 rounded-lg text-xs font-bold transition-all duration-300 ${
                                  activeServer.name === server.name 
                                    ? 'bg-white text-black shadow-[0_0_15px_rgba(255,255,255,0.4)] scale-105' 
                                    : 'bg-zinc-950 text-zinc-400 hover:bg-zinc-800 hover:text-white border border-zinc-800'
                                }`}
                              >
                                {server.name}
                              </button>
                            ))}
                          </div>
                        </div>
                        
                        <div className="relative w-full aspect-video bg-black rounded-2xl overflow-hidden shadow-[0_0_80px_rgba(229,9,20,0.15)] ring-1 ring-zinc-800 mb-10">
                          <div className="absolute inset-0 flex items-center justify-center -z-10 bg-zinc-950">
                             <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600"></div>
                          </div>
                          <iframe
                            key={activeServer.url + (selectedEpisodeData ? selectedEpisodeData.id : '')}
                            className="absolute inset-0 w-full h-full"
                            src={getIframeSrc()}
                            allowFullScreen
                            frameBorder="0"
                            title="Video Player"
                            referrerPolicy="origin"
                          />
                        </div>
                      </>
                    )}

                    {/* TV Show Episode Browser */}
                    {selectedMovie.Type === 'series' && (
                       <div className="bg-zinc-900/60 rounded-3xl p-6 sm:p-8 border border-zinc-800/80 backdrop-blur-xl shadow-2xl">
                          {loadingEpisodes ? (
                             <div className="flex flex-col items-center justify-center py-20">
                                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600 mb-4"></div>
                                <span className="text-zinc-500 font-medium tracking-widest uppercase text-sm">Loading TV Data...</span>
                             </div>
                          ) : showEpisodes.length > 0 ? (
                             <>
                                <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 gap-4">
                                  <h3 className="text-2xl font-black text-white flex items-center gap-3">
                                    <Film className="w-6 h-6 text-red-500" /> EPISODES
                                  </h3>
                                  <div className="relative w-full sm:w-auto min-w-[200px]">
                                    <select 
                                      className="w-full appearance-none bg-zinc-950 border-2 border-zinc-800 text-white py-3 pl-5 pr-12 rounded-xl focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 cursor-pointer font-bold text-lg shadow-inner transition-colors"
                                      value={selectedSeason}
                                      onChange={(e) => setSelectedSeason(Number(e.target.value))}
                                    >
                                      {showSeasons.map(season => (
                                        <option key={season} value={season}>Season {season}</option>
                                      ))}
                                    </select>
                                    <ChevronDown className="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-400 pointer-events-none" />
                                  </div>
                                </div>

                                <div className="space-y-4 max-h-[700px] overflow-y-auto pr-3 custom-scrollbar">
                                   {showEpisodes.filter(ep => ep.season === selectedSeason).map(episode => (
                                      <div 
                                        key={episode.id}
                                        onClick={() => playEpisode(episode)}
                                        className={`flex flex-col md:flex-row gap-5 p-4 sm:p-5 rounded-2xl cursor-pointer transition-all duration-300 ${
                                          selectedEpisodeData?.id === episode.id 
                                            ? 'bg-zinc-800 ring-2 ring-red-500 shadow-[0_10px_30px_rgba(229,9,20,0.2)] transform scale-[1.01]' 
                                            : 'bg-zinc-950/50 hover:bg-zinc-800 border border-transparent hover:border-zinc-700'
                                        }`}
                                      >
                                        <div className="w-full md:w-64 aspect-video bg-zinc-900 rounded-xl overflow-hidden shrink-0 relative group shadow-md">
                                          {episode.image?.medium ? (
                                             <img src={episode.image.medium} alt={episode.name} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-300" loading="lazy" />
                                          ) : (
                                             <div className="w-full h-full flex flex-col items-center justify-center text-zinc-700 bg-zinc-950"><Film className="w-8 h-8 mb-2" /><span className="text-xs font-bold uppercase">No Image</span></div>
                                          )}
                                          <div className="absolute inset-0 flex items-center justify-center bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 backdrop-blur-[2px]">
                                             <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(229,9,20,0.8)] transform scale-90 group-hover:scale-100 transition-transform">
                                                <Play className="w-6 h-6 text-white ml-1" fill="currentColor" />
                                             </div>
                                          </div>
                                        </div>

                                        <div className="flex-1 min-w-0 flex flex-col justify-center">
                                           <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-2 sm:gap-4 mb-2">
                                              <h4 className={`font-black text-xl sm:text-2xl truncate ${selectedEpisodeData?.id === episode.id ? 'text-red-500' : 'text-white'}`}>
                                                {episode.number}. {episode.name}
                                              </h4>
                                              <span className="text-zinc-500 font-bold text-sm bg-zinc-900 px-3 py-1 rounded-md shrink-0 self-start">
                                                {episode.airdate ? new Date(episode.airdate).getFullYear() : 'TBA'}
                                              </span>
                                           </div>
                                           <p className="text-zinc-400 text-sm sm:text-base line-clamp-3 leading-relaxed font-medium" 
                                              dangerouslySetInnerHTML={{ __html: episode.summary || 'No description available for this episode.' }} />
                                        </div>
                                      </div>
                                   ))}
                                </div>
                             </>
                          ) : (
                             <div className="text-center py-20 text-zinc-600">
                                <AlertCircle className="w-16 h-16 mx-auto mb-4 opacity-30" />
                                <p className="text-lg font-medium">No episode data available for this series.</p>
                             </div>
                          )}
                       </div>
                    )}
                  </div>
                )}

                {/* ENDLESS SCROLL RESULTS SECTION (Search OR Genre Browsing) */}
                {!isHome && (
                  <div className="max-w-7xl mx-auto">
                    {!selectedMovie && !loading && movies.length > 0 && (
                      <h3 className="text-2xl font-medium text-zinc-400 mb-8 flex items-center gap-2">
                        {browseContext === 'search' ? (
                          <>Results for <span className="text-white font-bold">"{query}"</span></>
                        ) : (
                          <>Browsing <span className="text-white font-bold">{activeGenre.genre} {activeGenre.type === 'movie' ? 'Movies' : 'TV Shows'}</span></>
                        )}
                      </h3>
                    )}

                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6 gap-y-8 sm:gap-y-10">
                      {movies.map((movie, index) => (
                        <div 
                          key={`${movie.imdbID}-${index}`} 
                          className="movie-card relative group cursor-pointer rounded-xl overflow-hidden bg-zinc-900 shadow-lg"
                          onClick={() => playMovie(movie)}
                        >
                          <div className="aspect-[2/3] w-full relative">
                            {/* IMDB Rating Badge */}
                            {movie.imdbRating && movie.imdbRating !== 'N/A' && (
                              <div className="absolute top-2 right-2 bg-black/80 backdrop-blur-md px-2 py-1 rounded-md flex items-center gap-1 z-20 border border-zinc-800 shadow-[0_4px_10px_rgba(0,0,0,0.5)]">
                                <Star className="w-3 h-3 text-yellow-500" fill="currentColor" />
                                <span className="text-white text-[11px] font-black">{movie.imdbRating}</span>
                              </div>
                            )}

                            {movie.Poster !== 'N/A' ? (
                              <img src={movie.Poster} alt={movie.Title} className="w-full h-full object-cover" loading="lazy" />
                            ) : (
                              <div className="w-full h-full flex flex-col items-center justify-center bg-zinc-950 text-zinc-700 p-4 text-center">
                                <Film className="w-12 h-12 mb-2 opacity-30" />
                                <span className="text-xs font-bold tracking-widest">NO POSTER</span>
                              </div>
                            )}
                            
                            <div className="poster-overlay absolute inset-0 flex flex-col items-center justify-center backdrop-blur-[2px]">
                              <div className="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center transform scale-50 group-hover:scale-100 transition-transform duration-300 shadow-[0_0_30px_rgba(229,9,20,0.8)]">
                                <Play className="w-6 h-6 text-white ml-1 pl-0.5" fill="currentColor" />
                              </div>
                              <span className="mt-4 font-black text-sm tracking-widest uppercase opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-100">
                                {movie.Type === 'series' ? 'Episodes' : 'Play Now'}
                              </span>
                            </div>
                          </div>
                          
                          <div className="p-4 bg-zinc-900">
                            <h4 className="text-white font-bold truncate text-sm mb-1" title={movie.Title}>{movie.Title}</h4>
                            <div className="flex items-center justify-between">
                               <p className="text-zinc-400 text-xs font-medium">{movie.Year}</p>
                               <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded-sm ${movie.Type === 'series' ? 'bg-blue-900/50 text-blue-400' : 'bg-red-900/50 text-red-400'}`}>
                                  {movie.Type === 'series' ? 'TV' : 'Movie'}
                               </span>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* Infinite Scroll Sentinel / Loader */}
                    {hasMore && (
                       <div ref={lastElementRef} className="py-16 flex flex-col items-center justify-center">
                          <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-red-600 mb-4"></div>
                          <span className="text-zinc-500 font-bold tracking-widest uppercase text-xs">Loading More...</span>
                       </div>
                    )}
                    
                    {!hasMore && movies.length > 0 && !loading && (
                       <div className="py-16 text-center text-zinc-600 font-bold uppercase tracking-widest text-sm">
                          End of Results
                       </div>
                    )}
                  </div>
                )}

                {/* INITIAL LOADING & ERROR STATES */}
                {loading && movies.length === 0 && !isHome && (
                  <div className="flex flex-col items-center justify-center py-32">
                    <div className="relative w-20 h-20">
                      <div className="absolute inset-0 border-4 border-zinc-800 rounded-full"></div>
                      <div className="absolute inset-0 border-4 border-red-600 rounded-full border-t-transparent animate-spin"></div>
                    </div>
                    <p className="mt-6 text-zinc-400 font-bold tracking-widest uppercase text-sm">Fetching DB...</p>
                  </div>
                )}

                {error && !loading && movies.length === 0 && (
                  <div className="flex flex-col items-center justify-center py-24 text-center">
                    <AlertCircle className="w-20 h-20 text-zinc-800 mb-6" />
                    <h3 className="text-3xl font-black text-white mb-3">No Titles Found</h3>
                    <p className="text-zinc-500 font-medium max-w-md">{error}</p>
                  </div>
                )}

                {/* NETFLIX-STYLE HOME PAGE */}
                {isHome && (
                  <div className="pb-12 max-w-screen-2xl mx-auto">
                    {loadingHome ? (
                       <div className="flex flex-col items-center justify-center py-32">
                         <div className="animate-spin rounded-full h-16 w-16 border-b-4 border-red-600 mb-6"></div>
                         <p className="text-zinc-400 font-bold tracking-widest uppercase">Building Library...</p>
                       </div>
                    ) : (
                       <div className="space-y-10 sm:space-y-16 mt-4 sm:mt-8">
                         {homeData.map((category, idx) => (
                           category.movies?.length > 0 && (
                             <div key={idx} className="w-full">
                               <h3 className="text-xl sm:text-2xl font-black text-white mb-4 sm:mb-6 flex items-center gap-3 pl-2 sm:pl-4 border-l-4 border-red-600">
                                 {category.title}
                               </h3>
                               
                               <div className="flex gap-4 sm:gap-5 overflow-x-auto pb-6 px-2 sm:px-4 snap-x snap-mandatory custom-scrollbar">
                                 {category.movies.map((movie, index) => (
                                   <div 
                                     key={`${movie.imdbID}-${index}`} 
                                     className="movie-card flex-none w-36 sm:w-44 md:w-48 lg:w-56 relative group cursor-pointer rounded-xl overflow-hidden bg-zinc-900 snap-start shadow-lg"
                                     onClick={() => playMovie(movie)}
                                   >
                                     <div className="aspect-[2/3] w-full relative">
                                       {/* IMDB Rating Badge */}
                                       {movie.imdbRating && movie.imdbRating !== 'N/A' && (
                                         <div className="absolute top-2 right-2 bg-black/80 backdrop-blur-md px-2 py-1 rounded-md flex items-center gap-1 z-20 border border-zinc-800 shadow-[0_4px_10px_rgba(0,0,0,0.5)]">
                                           <Star className="w-3 h-3 text-yellow-500" fill="currentColor" />
                                           <span className="text-white text-[11px] font-black">{movie.imdbRating}</span>
                                         </div>
                                       )}

                                       {movie.Poster !== 'N/A' ? (
                                         <img src={movie.Poster} alt={movie.Title} className="w-full h-full object-cover" loading="lazy" />
                                       ) : (
                                         <div className="w-full h-full flex flex-col items-center justify-center bg-zinc-950 text-zinc-700 p-4 text-center">
                                           <Film className="w-10 h-10 mb-2 opacity-30" />
                                           <span className="text-[10px] font-bold tracking-widest">NO POSTER</span>
                                         </div>
                                       )}
                                       
                                       <div className="poster-overlay absolute inset-0 flex flex-col items-center justify-center backdrop-blur-[2px]">
                                         <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center transform scale-50 group-hover:scale-100 transition-transform duration-300 shadow-[0_0_30px_rgba(229,9,20,0.8)]">
                                           <Play className="w-5 h-5 text-white ml-1" fill="currentColor" />
                                         </div>
                                       </div>
                                     </div>
                                     
                                     <div className="p-3 sm:p-4 bg-zinc-900">
                                       <h4 className="text-white font-bold truncate text-xs sm:text-sm mb-1">{movie.Title}</h4>
                                       <div className="flex items-center justify-between">
                                          <p className="text-zinc-500 text-[10px] sm:text-xs font-medium">{movie.Year}</p>
                                          <span className={`text-[9px] font-black uppercase px-1.5 py-0.5 rounded-sm ${movie.Type === 'series' ? 'bg-blue-900/50 text-blue-400' : 'bg-red-900/50 text-red-400'}`}>
                                             {movie.Type === 'series' ? 'TV' : 'Movie'}
                                          </span>
                                       </div>
                                     </div>
                                   </div>
                                 ))}
                               </div>
                             </div>
                           )
                         ))}
                       </div>
                    )}
                  </div>
                )}
              </main>
            </div>
          </React.Fragment>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
